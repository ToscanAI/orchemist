    </g>
    <g transform="translate(0, 144)" fill="#8A93A2">
      <circle cx="32" cy="18" r="4" fill="none" stroke="#5A6371"/>
      <text x="52" y="22">Run Cockpit</text><text x="206" y="22" fill="#5A6371" font-size="11" text-anchor="end">⌘2</text>
    </g>
    <g transform="translate(0, 184)">
