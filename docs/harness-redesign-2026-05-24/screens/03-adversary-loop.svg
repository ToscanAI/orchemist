      <text x="52" y="22" fill="#E8ECF3">Adversary Loop</text>
      <text x="206" y="22" fill="#5A6371" font-size="11" text-anchor="end">⌘3</text>
    </g>
    <g transform="translate(0, 224)" fill="#8A93A2">
      <circle cx="32" cy="18" r="4" fill="none" stroke="#5A6371"/>
      <text x="52" y="22">Trust &amp; Gates</text><text x="206" y="22" fill="#5A6371" font-size="11" text-anchor="end">⌘4</text>
    </g>
    <g transform="translate(0, 264)" fill="#8A93A2">
      <circle cx="32" cy="18" r="4" fill="none" stroke="#5A6371"/>
      <text x="52" y="22">Admin / Activation</text><text x="206" y="22" fill="#5A6371" font-size="11" text-anchor="end">⌘5</text>
