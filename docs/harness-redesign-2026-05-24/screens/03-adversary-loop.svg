      <text x="16" y="44" fill="#E8ECF3" font-size="11" font-weight="600">Proposes: 4 new files, no consume verdict</text>
      <text x="16" y="64" fill="#8A93A2" font-size="11">- src/.../verdict_extract.py (new)</text>
      <text x="16" y="80" fill="#8A93A2" font-size="11">- src/.../verdict_normalize.py (new)</text>
