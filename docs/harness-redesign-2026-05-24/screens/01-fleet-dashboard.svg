      <g>
        <text x="20" y="0" fill="#E8ECF3">orchemist</text>
        <text x="180" y="0" fill="#8A93A2">#802</text>
        <g transform="translate(320, -12)">
          <rect width="148" height="18" rx="4" fill="#1F2C3B" stroke="#7C5CFC"/>
          <text x="8" y="12" fill="#E8ECF3" font-size="10">5/10 acceptance_test</text>
        </g>
        <text x="490" y="0" fill="#8A93A2" font-size="11">opus</text>
        <text x="600" y="0" fill="#E8ECF3">$1.82</text>
        <text x="680" y="0" fill="#8A93A2">~6 min</text>
        <text x="780" y="0" fill="#2DD4BF" text-anchor="end">0.91 ▲</text>
      </g>
      <g transform="translate(0, 36)">
        <text x="20" y="0" fill="#E8ECF3">orchemist</text>
        <text x="180" y="0" fill="#8A93A2">#799</text>
        <g transform="translate(320, -12)">
          <rect width="148" height="18" rx="4" fill="#3B2E1F" stroke="#F59E0B"/>
          <text x="8" y="12" fill="#E8ECF3" font-size="10">3/10 spec_adversary R2</text>
        </g>
        <text x="490" y="0" fill="#8A93A2" font-size="11">opus</text>
        <text x="600" y="0" fill="#E8ECF3">$3.40</text>
        <text x="680" y="0" fill="#F59E0B">↑ R3?</text>
        <text x="780" y="0" fill="#F59E0B" text-anchor="end">0.62 ▼</text>
      </g>
      <g transform="translate(0, 72)">
        <text x="20" y="0" fill="#E8ECF3">orchemist</text>
        <text x="180" y="0" fill="#8A93A2">#776</text>
        <g transform="translate(320, -12)">
          <rect width="148" height="18" rx="4" fill="#1F2C3B" stroke="#7C5CFC"/>
          <text x="8" y="12" fill="#E8ECF3" font-size="10">7/10 implement</text>
        </g>
        <text x="490" y="0" fill="#8A93A2" font-size="11">sonnet</text>
        <text x="600" y="0" fill="#E8ECF3">$0.64</text>
        <text x="680" y="0" fill="#8A93A2">~2 min</text>
        <text x="780" y="0" fill="#2DD4BF" text-anchor="end">0.88 ▲</text>
      </g>
      <g transform="translate(0, 108)">
        <text x="20" y="0" fill="#E8ECF3">orchemist-skills</text>
        <text x="180" y="0" fill="#8A93A2">#3 (local)</text>
        <g transform="translate(320, -12)">
          <rect width="148" height="18" rx="4" fill="#1B2A1F" stroke="#2DD4BF"/>
          <text x="8" y="12" fill="#E8ECF3" font-size="10">0/10 phase0 inventory</text>
        </g>
        <text x="490" y="0" fill="#8A93A2" font-size="11">sonnet</text>
        <text x="600" y="0" fill="#E8ECF3">$0.04</text>
        <text x="680" y="0" fill="#8A93A2">~12 min</text>
        <text x="780" y="0" fill="#8A93A2" text-anchor="end">—</text>
      </g>
    </g>

    <!-- Empty state hint -->
    <text x="20" y="260" font-size="10" fill="#5A6371">Showing 4 of 4 active runs · last 50 history → <tspan fill="#7C5CFC" text-decoration="underline">/runs</tspan></text>
  </g>

  <!-- Row 2 right column: Autonomy ramp -->
  <g transform="translate(1104, 220)" font-size="11">
    <rect width="312" height="298" rx="10" fill="url(#card)" stroke="#20242C"/>
    <text x="20" y="28" fill="#E8ECF3" font-size="14" font-weight="700">Autonomy ramp</text>
    <text x="20" y="44" fill="#8A93A2">global · this org · adjust on <tspan fill="#7C5CFC" text-decoration="underline">Admin ⌘5</tspan></text>

    <!-- Level steps -->
    <g transform="translate(20, 80)">
      <line x1="12" y1="0" x2="12" y2="180" stroke="#20242C" stroke-width="2"/>
      <g>
        <circle cx="12" cy="0" r="6" fill="#2DD4BF"/>
        <text x="32" y="4" fill="#E8ECF3" font-weight="600">Level 3 · review-all</text>
        <text x="32" y="20" fill="#5A6371" font-size="10">reached 2026-03-04</text>
      </g>
      <g transform="translate(0, 60)">
        <circle cx="12" cy="0" r="6" fill="#2DD4BF"/>
        <text x="32" y="4" fill="#E8ECF3" font-weight="600">Level 4 · auto-merge ≥ 0.90</text>
        <text x="32" y="20" fill="#5A6371" font-size="10">reached 2026-04-21</text>
      </g>
      <g transform="translate(0, 120)">
        <circle cx="12" cy="0" r="6" fill="#F59E0B" stroke="#0B0D10" stroke-width="2"/>
        <text x="32" y="4" fill="#F59E0B" font-weight="600">Level 4.3 · current</text>
        <text x="32" y="20" fill="#5A6371" font-size="10">unlock L5 needs · fleet UI · stale detect</text>
      </g>
      <g transform="translate(0, 180)" opacity="0.5">
        <circle cx="12" cy="0" r="6" fill="none" stroke="#5A6371"/>
        <text x="32" y="4" fill="#8A93A2" font-weight="600">Level 5 · dark factory</text>
      </g>
    </g>

    <!-- Promote button -->
    <g transform="translate(20, 260)">
      <rect width="272" height="32" rx="6" fill="none" stroke="#7C5CFC" stroke-dasharray="3 3"/>
      <text x="136" y="20" fill="#7C5CFC" font-size="11" text-anchor="middle" font-weight="600">Request promotion to Level 5 · blocked</text>
    </g>
  </g>

  <!-- Row 3: Regression queue + Stale detection -->
  <g transform="translate(264, 540)" font-size="11">
    <rect width="540" height="296" rx="10" fill="url(#card)" stroke="#20242C"/>
    <text x="20" y="28" fill="#E8ECF3" font-size="14" font-weight="700">Regression queue</text>
    <text x="20" y="44" fill="#EF4444">2 detected · auto-fix pipelines spawned</text>

    <g transform="translate(0, 80)" font-size="12">
      <rect x="20" y="-22" width="500" height="56" rx="6" fill="#1B1F26" stroke="#EF4444"/>
      <text x="36" y="0" fill="#E8ECF3" font-weight="600">orchemist · CI · main</text>
      <text x="36" y="18" fill="#8A93A2" font-size="11">test_postmortem_spec_routing failed since 7253d9a (4h ago)</text>
      <text x="500" y="18" fill="#7C5CFC" font-size="11" text-anchor="end" text-decoration="underline">PR #810 ↗</text>

      <rect x="20" y="44" width="500" height="56" rx="6" fill="#1B1F26" stroke="#EF4444"/>
      <text x="36" y="66" fill="#E8ECF3" font-weight="600">orchemist-website · build</text>
      <text x="36" y="84" fill="#8A93A2" font-size="11">image regen step 502 from Vercel · pipeline retrying</text>
      <text x="500" y="84" fill="#F59E0B" font-size="11" text-anchor="end">retry 2/3</text>
    </g>

    <text x="20" y="280" font-size="10" fill="#5A6371">closes ROADMAP §3.3 (regression.py) · UI surface for §3.4</text>
  </g>

  <g transform="translate(828, 540)" font-size="11">
    <rect width="588" height="296" rx="10" fill="url(#card)" stroke="#20242C"/>
    <text x="20" y="28" fill="#E8ECF3" font-size="14" font-weight="700">Stale detection · proactive maintenance</text>
    <text x="20" y="44" fill="#8A93A2">ROADMAP §3.5 · scan cadence 24h · next 04:00 UTC</text>

    <g transform="translate(0, 76)" font-size="11">
      <text x="20" y="0" fill="#5A6371" font-size="10" letter-spacing="1">FINDINGS (3)</text>
      <g transform="translate(20, 16)" font-size="12">
        <circle cx="6" cy="6" r="3" fill="#F59E0B"/>
        <text x="20" y="10" fill="#E8ECF3">orchemist · docs/openrouter-setup.md references stale env var</text>
        <text x="20" y="28" fill="#5A6371" font-size="11">draft fix PR ready · <tspan fill="#7C5CFC" text-decoration="underline">/orchemist:run --dry-run</tspan></text>
      </g>
      <g transform="translate(20, 70)" font-size="12">
        <circle cx="6" cy="6" r="3" fill="#F59E0B"/>
        <text x="20" y="10" fill="#E8ECF3">orchemist · 5 dependencies have CVE patches available</text>
        <text x="20" y="28" fill="#5A6371" font-size="11">cycle through deps-pipeline-v1 · ETA 12 min</text>
      </g>
      <g transform="translate(20, 124)" font-size="12">
        <circle cx="6" cy="6" r="3" fill="#5A6371"/>
        <text x="20" y="10" fill="#8A93A2">orchemist-skills · v4.2 changelog references future v5 · clarify</text>
        <text x="20" y="28" fill="#5A6371" font-size="11">human review · ambiguous priority</text>
      </g>
    </g>

    <text x="20" y="276" font-size="10" fill="#5A6371">Adversary review on every fix · cross-model via <tspan fill="#7C5CFC" text-decoration="underline">⌘3 Adversary Loop</tspan></text>
  </g>

  <!-- ===== Bottom status strip (32px) ===== -->
  <rect x="240" y="868" width="1200" height="32" fill="#0E1115" stroke="#1F2329" stroke-width="1"/>
  <g font-size="10" fill="#8A93A2">
    <circle cx="260" cy="884" r="3" fill="#2DD4BF"/>
    <text x="272" y="887">engine 0.9.0 · daemon up 3d 4h</text>
    <circle cx="448" cy="884" r="3" fill="#2DD4BF"/>
    <text x="460" y="887">openrouter · 7 phases / hour avg</text>
    <circle cx="650" cy="884" r="3" fill="#F59E0B"/>
    <text x="662" y="887">openclaw gateway · idle (deactivated)</text>
    <circle cx="868" cy="884" r="3" fill="#2DD4BF"/>
    <text x="880" y="887">claude code · skills pack v4.2 installed locally</text>
    <text x="1416" y="887" text-anchor="end" fill="#5A6371">screen 1 / 6 · 2026-05-24</text>
  </g>
</svg>
