      <text x="180" y="0">ISSUE</text>
      <text x="320" y="0">PHASE</text>
      <text x="490" y="0">MODEL</text>
      <text x="600" y="0">COST</text>
      <text x="680" y="0">ETA</text>
      <text x="780" y="0" text-anchor="end">CONFIDENCE</text>
      <line x1="20" y1="8" x2="796" y2="8" stroke="#20242C"/>
    </g>

    <!-- Run rows -->
