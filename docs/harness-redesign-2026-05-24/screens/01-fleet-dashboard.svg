<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" font-family="ui-sans-serif, system-ui, -apple-system" fill="#E8ECF3">
  <!-- ====== Orchemist Harness — Screen 1 of 6: Fleet Dashboard ====== -->
  <defs>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7C5CFC"/>
      <stop offset="100%" stop-color="#2DD4BF"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1B1F26"/>
      <stop offset="100%" stop-color="#14171C"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1A1E25" stroke-width="0.5"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1440" height="900" fill="#0B0D10"/>
  <rect width="1440" height="900" fill="url(#grid)" opacity="0.4"/>

  <!-- ===== Left rail (240px) ===== -->
  <rect x="0" y="0" width="240" height="900" fill="#0E1115" stroke="#1F2329" stroke-width="1"/>
  <g font-size="13" font-weight="600">
    <!-- Logo / brand -->
    <text x="24" y="44" font-size="18" font-weight="800" fill="url(#brand)">ORCHEMIST</text>
    <text x="24" y="62" font-size="10" font-weight="500" fill="#8A93A2" letter-spacing="2">HARNESS · LEVEL 5</text>

    <!-- Nav items -->
    <g transform="translate(0, 100)">
      <rect x="12" y="0" width="216" height="36" rx="6" fill="#161A21" stroke="#7C5CFC" stroke-width="1.5"/>
      <circle cx="32" cy="18" r="4" fill="#7C5CFC"/>
      <text x="52" y="22" fill="#E8ECF3">Fleet Dashboard</text>
      <text x="206" y="22" fill="#5A6371" font-size="11" text-anchor="end">⌘1</text>
    </g>
    <g transform="translate(0, 144)" fill="#8A93A2">
      <circle cx="32" cy="18" r="4" fill="none" stroke="#5A6371"/>
      <text x="52" y="22">Run Cockpit</text>
      <text x="206" y="22" fill="#5A6371" font-size="11" text-anchor="end">⌘2</text>
    </g>
    <g transform="translate(0, 184)" fill="#8A93A2">
      <circle cx="32" cy="18" r="4" fill="none" stroke="#5A6371"/>
      <text x="52" y="22">Adversary Loop</text>
      <text x="206" y="22" fill="#5A6371" font-size="11" text-anchor="end">⌘3</text>
    </g>
    <g transform="translate(0, 224)" fill="#8A93A2">
      <circle cx="32" cy="18" r="4" fill="none" stroke="#5A6371"/>
      <text x="52" y="22">Trust &amp; Gates</text>
      <text x="206" y="22" fill="#5A6371" font-size="11" text-anchor="end">⌘4</text>
    </g>
    <g transform="translate(0, 264)" fill="#8A93A2">
      <circle cx="32" cy="18" r="4" fill="none" stroke="#5A6371"/>
      <text x="52" y="22">Admin / Activation</text>
      <text x="206" y="22" fill="#5A6371" font-size="11" text-anchor="end">⌘5</text>
    </g>
    <g transform="translate(0, 304)" fill="#8A93A2">
      <circle cx="32" cy="18" r="4" fill="none" stroke="#5A6371"/>
      <text x="52" y="22">Skills Pack Mode</text>
      <text x="206" y="22" fill="#5A6371" font-size="11" text-anchor="end">⌘6</text>
    </g>

    <!-- Repo switcher -->
    <text x="24" y="400" font-size="10" letter-spacing="2" fill="#5A6371" font-weight="600">REPOSITORIES (4)</text>
    <g transform="translate(0, 416)" font-size="12" font-weight="500">
      <rect x="12" y="0" width="216" height="28" rx="4" fill="#161A21"/>
      <circle cx="28" cy="14" r="3" fill="#2DD4BF"/>
      <text x="42" y="18" fill="#E8ECF3">orchemist</text>
      <text x="218" y="18" font-size="10" fill="#5A6371" text-anchor="end">3 active</text>
    </g>
    <g transform="translate(0, 448)" fill="#8A93A2">
      <circle cx="28" cy="14" r="3" fill="#2DD4BF"/>
      <text x="42" y="18">orchemist-skills</text>
      <text x="218" y="18" font-size="10" fill="#5A6371" text-anchor="end">1 active</text>
    </g>
    <g transform="translate(0, 480)" fill="#8A93A2">
      <circle cx="28" cy="14" r="3" fill="#F59E0B"/>
      <text x="42" y="18">orchemist-website</text>
      <text x="218" y="18" font-size="10" fill="#5A6371" text-anchor="end">idle</text>
    </g>
    <g transform="translate(0, 512)" fill="#8A93A2">
      <circle cx="28" cy="14" r="3" fill="#5A6371"/>
      <text x="42" y="18" text-decoration="line-through">orchemist-ide</text>
      <text x="218" y="18" font-size="10" fill="#EF4444" text-anchor="end">deprecated</text>
    </g>
    <text x="24" y="560" font-size="10" fill="#5A6371">+ Add repository</text>

    <!-- Footer -->
    <text x="24" y="864" font-size="10" fill="#5A6371">Conny-Lazo</text>
    <text x="24" y="880" font-size="10" fill="#5A6371">contact@renerivera.net</text>
  </g>

  <!-- ===== Top bar (64px) ===== -->
  <rect x="240" y="0" width="1200" height="64" fill="#0E1115" stroke="#1F2329" stroke-width="1"/>
  <text x="264" y="28" font-size="11" fill="#5A6371">Home /</text>
  <text x="299" y="28" font-size="11" fill="#E8ECF3" font-weight="600">Fleet Dashboard</text>
  <text x="264" y="48" font-size="20" font-weight="700" fill="#E8ECF3">Hello René — fleet status as of 19:34 UTC</text>

  <!-- Autonomy pill -->
  <g transform="translate(1090, 18)">
    <rect width="140" height="28" rx="14" fill="#1B1F26" stroke="url(#brand)" stroke-width="1.5"/>
    <circle cx="16" cy="14" r="4" fill="#2DD4BF"/>
    <text x="28" y="18" font-size="11" font-weight="600" fill="#E8ECF3">Autonomy: Level 4.3</text>
  </g>
  <!-- Cost pill -->
  <g transform="translate(1240, 18)" font-size="11">
    <rect width="120" height="28" rx="14" fill="#1B1F26" stroke="#20242C"/>
    <text x="14" y="18" fill="#8A93A2">Today:</text>
    <text x="52" y="18" font-weight="600" fill="#E8ECF3">$12.47</text>
    <text x="100" y="18" fill="#2DD4BF">▲</text>
  </g>
  <!-- User -->
  <circle cx="1395" cy="32" r="14" fill="url(#brand)"/>
  <text x="1395" y="36" font-size="11" font-weight="700" fill="#0B0D10" text-anchor="middle">RR</text>

  <!-- ===== Main content area: 1200 x 804 ===== -->

  <!-- Row 1: KPI cards (4 across) -->
  <g transform="translate(264, 88)" font-size="11">
    <!-- Card 1: Active runs -->
    <g>
      <rect width="276" height="108" rx="10" fill="url(#card)" stroke="#20242C"/>
      <text x="20" y="28" fill="#8A93A2" font-size="10" letter-spacing="2">ACTIVE RUNS</text>
      <text x="20" y="68" fill="#E8ECF3" font-size="38" font-weight="700">4</text>
      <text x="20" y="92" fill="#2DD4BF" font-size="11">3 nominal · 1 escalating</text>
    </g>
    <!-- Card 2 -->
    <g transform="translate(300, 0)">
      <rect width="276" height="108" rx="10" fill="url(#card)" stroke="#20242C"/>
      <text x="20" y="28" fill="#8A93A2" font-size="10" letter-spacing="2">GATES NEEDING REVIEW</text>
      <text x="20" y="68" fill="#F59E0B" font-size="38" font-weight="700">7</text>
      <text x="20" y="92" fill="#8A93A2" font-size="11">oldest 2h 14m → <tspan fill="#7C5CFC" text-decoration="underline">Trust &amp; Gates ⌘4</tspan></text>
    </g>
    <!-- Card 3 -->
    <g transform="translate(600, 0)">
      <rect width="276" height="108" rx="10" fill="url(#card)" stroke="#20242C"/>
      <text x="20" y="28" fill="#8A93A2" font-size="10" letter-spacing="2">REGRESSIONS DETECTED</text>
      <text x="20" y="68" fill="#EF4444" font-size="38" font-weight="700">2</text>
      <text x="20" y="92" fill="#8A93A2" font-size="11">auto-fix pipelines spawned · 1 PR open</text>
    </g>
    <!-- Card 4 -->
    <g transform="translate(900, 0)">
      <rect width="276" height="108" rx="10" fill="url(#card)" stroke="#20242C"/>
      <text x="20" y="28" fill="#8A93A2" font-size="10" letter-spacing="2">SHIPPED LAST 24H</text>
      <text x="20" y="68" fill="#2DD4BF" font-size="38" font-weight="700">14</text>
      <text x="20" y="92" fill="#8A93A2" font-size="11">11 auto-merged · 3 human-reviewed</text>
    </g>
  </g>

  <!-- Row 2: Active pipeline runs strip -->
  <g transform="translate(264, 220)" font-size="11">
    <rect width="816" height="298" rx="10" fill="url(#card)" stroke="#20242C"/>
    <text x="20" y="28" fill="#E8ECF3" font-size="14" font-weight="700">In-flight pipeline runs</text>
    <text x="20" y="44" fill="#8A93A2">click any row → <tspan fill="#7C5CFC" text-decoration="underline">Run Cockpit ⌘2</tspan></text>
    <text x="796" y="28" fill="#8A93A2" font-size="10" letter-spacing="2" text-anchor="end">LIVE · SSE</text>
    <circle cx="780" cy="26" r="3" fill="#2DD4BF">
      <animate attributeName="opacity" values="0.4;1;0.4" dur="1.6s" repeatCount="indefinite"/>
    </circle>

