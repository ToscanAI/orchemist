name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Docs-only gate (#889): docs-only PRs short-circuit substantive steps
      # but the job still reports SUCCESS (not SKIPPED) so branch-protection
      # required-check rules remain satisfied for docs PRs.
      # dorny/paths-filter compares HEAD against the PR base on pull_request
      # events (correct behavior). On push events to main, it compares against
      # the previous commit on the branch — which can produce surprising
      # results (e.g. a push that merges a docs-only PR may evaluate to
      # non_docs=false even though main pushes are meant to run full CI).
      # We mitigate by explicitly setting `base: main` so push events compare
      # against the configured base; for pull_request events, the action's
      # default base-detection still wins.
      # FIX 2026-06-10 (#958): the original `docs_only` filter listed the doc
      # patterns directly, but dorny/paths-filter outputs true when ANY
      # changed file matches — so a mixed code+docs PR (e.g. pyproject.toml +
      # CHANGELOG.md) was misclassified docs_only=true and skipped this job's
      # substantive steps while still reporting SUCCESS. Inverted detection:
      # with `predicate-quantifier: every`, a file matches `non_docs` only if
      # it matches EVERY negated pattern (i.e. it is not a doc file), so
      # non_docs=true ⇔ at least one substantive file changed. Substantive
      # steps run iff non_docs == 'true'; pure docs PRs still short-circuit
      # to SUCCESS (not SKIPPED) so required checks stay satisfied.
      - name: Detect substantive (non-docs) changes
        id: changes
        uses: dorny/paths-filter@v3
        with:
          base: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.ref || 'main' }}
          predicate-quantifier: 'every'
          filters: |
            non_docs:
              - '!**.md'
              - '!docs/**'
              - '!LICENSE'
              - '!.github/ISSUE_TEMPLATE/**'

      - name: Set up Python ${{ matrix.python-version }}
        if: steps.changes.outputs.non_docs == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        if: steps.changes.outputs.non_docs == 'true'
        run: pip install -e ".[dev,web,github]"

      - name: Run tests
        if: steps.changes.outputs.non_docs == 'true'
        run: pytest

      - name: Validate bundled templates
        if: steps.changes.outputs.non_docs == 'true'
        run: |
          shopt -s nullglob
          templates=(templates/*.yaml)
          if [ ${#templates[@]} -eq 0 ]; then
            echo "No templates found — skipping validation"
            exit 0
          fi
          for f in "${templates[@]}"; do
            echo "Validating $f..."
            orch validate "$f"
          done

      - name: Template drift lint
        if: steps.changes.outputs.non_docs == 'true'
        run: python3 scripts/check_template_sync.py

  # ----------------------------------------------------------------------
  # Issue #917 — Cross-repo template/skill parity guardrail.
  #
  # The engine is canonical for the shared coding-pipeline prompts; the
  # standalone copies in ToscanAI/orchemist-skills must not silently drift.
  # This job clones the skills repo as a sibling and runs the cross-repo
  # parity check (prompt byte/anchor equality + the spec_adversary.model_tier
  # == opus lock). Skills has no CI of its own, so THIS job is the sole
  # authoritative parity gate. It is `needs:`-free so it runs in parallel.
  #
  # The intra-engine `test` job's line-75 drift lint is unchanged (skills not
  # present there → cross-repo auto-skips). The docs-only paths-filter gate
  # makes docs-only PRs report SUCCESS without running the check.
  # ----------------------------------------------------------------------
  cross-repo-parity:
    name: Cross-repo parity (engine ↔ skills)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout engine
        uses: actions/checkout@v4

      # FIX 2026-06-10 (#958): the original `docs_only` filter listed the doc
      # patterns directly, but dorny/paths-filter outputs true when ANY
      # changed file matches — so a mixed code+docs PR (e.g. pyproject.toml +
      # CHANGELOG.md) was misclassified docs_only=true and skipped this job's
      # substantive steps while still reporting SUCCESS. Inverted detection:
      # with `predicate-quantifier: every`, a file matches `non_docs` only if
      # it matches EVERY negated pattern (i.e. it is not a doc file), so
      # non_docs=true ⇔ at least one substantive file changed. Substantive
      # steps run iff non_docs == 'true'; pure docs PRs still short-circuit
      # to SUCCESS (not SKIPPED) so required checks stay satisfied.
      - name: Detect substantive (non-docs) changes
        id: changes
        uses: dorny/paths-filter@v3
        with:
          base: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.ref || 'main' }}
          predicate-quantifier: 'every'
          filters: |
            non_docs:
              - '!**.md'
              - '!docs/**'
              - '!LICENSE'
              - '!.github/ISSUE_TEMPLATE/**'

      - name: Clone orchemist-skills (sibling)
        if: steps.changes.outputs.non_docs == 'true'
        run: git clone --depth 1 https://github.com/ToscanAI/orchemist-skills.git ../orchemist-skills

      - name: Set up Python 3.11
        if: steps.changes.outputs.non_docs == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies (engine)
        if: steps.changes.outputs.non_docs == 'true'
        run: pip install -e ".[dev]"

      - name: Cross-repo parity check
        if: steps.changes.outputs.non_docs == 'true'
        run: python3 scripts/check_template_sync.py --skills-dir ../orchemist-skills/pipelines

  # ----------------------------------------------------------------------
  # Issue #889 — Playwright e2e required check on PRs.
  #
  # Spins up the engine (`orch api-server`) + Next dev server in background,
  # then runs the Playwright suite against them. Caches `node_modules` +
  # Playwright browsers so warm-cache runs stay under ~2 min.
  #
  # Live-mode tests (`harness-live.spec.ts`) skip with a documented warning
  # if the engine fails to boot within 30s — see step "Wait for engine ready"
  # below for the LIVE_ENGINE_AVAILABLE gating logic.
  #
  # The docs-only paths-filter gate ensures docs-only PRs report SUCCESS
  # without actually running e2e tests (same pattern as the test job above).
  # ----------------------------------------------------------------------
  playwright-e2e:
    name: Playwright e2e
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # dorny/paths-filter compares HEAD against the PR base on pull_request
      # events (correct behavior). On push events to main, it compares against
      # the previous commit on the branch — which can produce surprising
      # results (e.g. a push that merges a docs-only PR may evaluate to
      # non_docs=false even though main pushes are meant to run full CI).
      # We mitigate by explicitly setting `base: main` so push events compare
      # against the configured base; for pull_request events, the action's
      # default base-detection still wins.
      # FIX 2026-06-10 (#958): the original `docs_only` filter listed the doc
      # patterns directly, but dorny/paths-filter outputs true when ANY
      # changed file matches — so a mixed code+docs PR (e.g. pyproject.toml +
      # CHANGELOG.md) was misclassified docs_only=true and skipped this job's
      # substantive steps while still reporting SUCCESS. Inverted detection:
      # with `predicate-quantifier: every`, a file matches `non_docs` only if
      # it matches EVERY negated pattern (i.e. it is not a doc file), so
      # non_docs=true ⇔ at least one substantive file changed. Substantive
      # steps run iff non_docs == 'true'; pure docs PRs still short-circuit
      # to SUCCESS (not SKIPPED) so required checks stay satisfied.
      - name: Detect substantive (non-docs) changes
        id: changes
        uses: dorny/paths-filter@v3
        with:
          base: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.ref || 'main' }}
          predicate-quantifier: 'every'
          filters: |
            non_docs:
              - '!**.md'
              - '!docs/**'
              - '!LICENSE'
              - '!.github/ISSUE_TEMPLATE/**'

      - name: Set up Python 3.11
        if: steps.changes.outputs.non_docs == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: pyproject.toml

      - name: Install Python dependencies (engine)
        if: steps.changes.outputs.non_docs == 'true'
        run: pip install -e ".[dev,web,github]"

      - name: Set up Node 20
        if: steps.changes.outputs.non_docs == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Cache Playwright browsers
        if: steps.changes.outputs.non_docs == 'true'
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install frontend dependencies
        if: steps.changes.outputs.non_docs == 'true'
        run: cd frontend && npm ci

      - name: Install Playwright browsers
        if: steps.changes.outputs.non_docs == 'true'
        run: cd frontend && npx playwright install --with-deps chromium

      - name: Start engine (orch api-server)
        if: steps.changes.outputs.non_docs == 'true'
        run: |
          nohup orch api-server --port 8771 --host 127.0.0.1 > /tmp/api-server.log 2>&1 &
          echo $! > /tmp/api-server.pid
          echo "engine pid: $(cat /tmp/api-server.pid)"

      - name: Wait for engine ready
        if: steps.changes.outputs.non_docs == 'true'
        continue-on-error: true
        run: |
          if bash scripts/wait_for_url.sh http://127.0.0.1:8771/api/v1/health 30 engine; then
            echo "LIVE_ENGINE_AVAILABLE=true" >> "$GITHUB_ENV"
          else
            echo "::warning::Engine failed to boot within 30s — live-mode tests will skip"
            echo "LIVE_ENGINE_AVAILABLE=false" >> "$GITHUB_ENV"
            echo "----- /tmp/api-server.log (last 50 lines) -----"
            tail -n 50 /tmp/api-server.log || true
          fi

      - name: Start Next dev server
        if: steps.changes.outputs.non_docs == 'true'
        run: |
          cd frontend
          nohup npm run dev -- --port 3010 > /tmp/next-dev.log 2>&1 &
          echo $! > /tmp/next-dev.pid
          echo "next pid: $(cat /tmp/next-dev.pid)"

      - name: Wait for Next dev ready
        if: steps.changes.outputs.non_docs == 'true'
        run: bash scripts/wait_for_url.sh http://127.0.0.1:3010 60 next-dev

      - name: Run Playwright tests
        if: steps.changes.outputs.non_docs == 'true'
        env:
          PW_BASE_URL: http://localhost:3010
          CI: 'true'
        run: |
          cd frontend
          if [ "${LIVE_ENGINE_AVAILABLE:-false}" = "true" ]; then
            PW_BASE_URL=http://localhost:3010 npx playwright test --reporter=list
          else
            echo "::notice::LIVE_ENGINE_AVAILABLE=false — filtering live specs via --grep-invert"
            PW_BASE_URL=http://localhost:3010 npx playwright test --reporter=list --grep-invert "live ·"
          fi

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.run_id }}
          path: frontend/playwright-report
          if-no-files-found: ignore
          retention-days: 14

      - name: Cleanup background processes
        if: always()
        run: |
          if [ -f /tmp/api-server.pid ]; then
            kill "$(cat /tmp/api-server.pid)" 2>/dev/null || true
          fi
          if [ -f /tmp/next-dev.pid ]; then
            kill "$(cat /tmp/next-dev.pid)" 2>/dev/null || true
          fi

  # ----------------------------------------------------------------------
  # Issue #962 — Lint gate (Part B of #713).
  #
  # Part A-1 (#961, merge 577fa17) made src/ black --check + ruff check clean
  # against the pyproject rule set (1757→0). This job is the CI gate that
  # keeps it clean: ruff + black run against src/ on every substantive PR.
  # Config comes entirely from pyproject.toml ([tool.ruff]/[tool.ruff.lint]
  # + [tool.black]) — no CLI flags. needs:-free so it runs in parallel.
  #
  # The docs-only paths-filter gate (same as the sibling jobs) makes
  # docs-only PRs report SUCCESS without running ruff/black.
  # ----------------------------------------------------------------------
  lint:
    name: Lint (ruff + black)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # FIX 2026-06-10 (#958): the original `docs_only` filter listed the doc
      # patterns directly, but dorny/paths-filter outputs true when ANY
      # changed file matches — so a mixed code+docs PR (e.g. pyproject.toml +
      # CHANGELOG.md) was misclassified docs_only=true and skipped this job's
      # substantive steps while still reporting SUCCESS. Inverted detection:
      # with `predicate-quantifier: every`, a file matches `non_docs` only if
      # it matches EVERY negated pattern (i.e. it is not a doc file), so
      # non_docs=true ⇔ at least one substantive file changed. Substantive
      # steps run iff non_docs == 'true'; pure docs PRs still short-circuit
      # to SUCCESS (not SKIPPED) so required checks stay satisfied.
      - name: Detect substantive (non-docs) changes
        id: changes
        uses: dorny/paths-filter@v3
        with:
          base: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.ref || 'main' }}
          predicate-quantifier: 'every'
          filters: |
            non_docs:
              - '!**.md'
              - '!docs/**'
              - '!LICENSE'
              - '!.github/ISSUE_TEMPLATE/**'

      - name: Set up Python 3.12
        if: steps.changes.outputs.non_docs == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # Pin the lint tools at the JOB level (not via pyproject's dev extra):
      # pyproject locks the *config* (rule selection, line length, target),
      # but only a version pin freezes ruff's rule set / black's stable style.
      # An unpinned `pip install black` would eventually pull a future
      # calendar-major whose restyle reds today's clean src/ on an untouched
      # main. ruff is 0.x (style/rule drift lands in MINOR bumps), black is
      # calendar-versioned (style keyed to the year-major). Pin to the
      # current lines; bump these deliberately when adopting a newer tool.
      - name: Install lint tools
        if: steps.changes.outputs.non_docs == 'true'
        run: pip install "ruff==0.15.*" "black==26.*"

      - name: Ruff (src/)
        if: steps.changes.outputs.non_docs == 'true'
        run: ruff check src/

      - name: Black check (src/)
        if: steps.changes.outputs.non_docs == 'true'
        run: black --check src/
