name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -e ".[dev,web,github]"

      - name: Run tests
        run: pytest

      - name: Validate bundled templates
        run: |
          shopt -s nullglob
          templates=(templates/*.yaml)
          if [ ${#templates[@]} -eq 0 ]; then
            echo "No templates found — skipping validation"
            exit 0
          fi
          for f in "${templates[@]}"; do
            echo "Validating $f..."
            orch validate "$f"
          done

      - name: Template drift lint
        run: python3 scripts/check_template_sync.py
