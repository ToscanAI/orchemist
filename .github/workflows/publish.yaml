name: Publish to PyPI

# NOTE: This workflow triggers on any v*.*.* tag push (branch-agnostic).
# Convention: only create version tags from the main branch.
# See: https://github.com/ToscanAI/orchestration-engine/blob/main/CONTRIBUTING.md
on:
  push:
    tags:
      - "v*.*.*"

jobs:
  build-and-publish:
    name: Build and publish to PyPI
    runs-on: ubuntu-latest
    environment: pypi  # optional GitHub environment for approval gate
    permissions:
      id-token: write  # required for OIDC Trusted Publisher
      contents: read   # required to checkout the repository

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # Fetch the tag object (not just the commit) so `git tag -v`
          # can read the signature payload.
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ----------------------------------------------------------------
      # Signed-tag verification — issue #890.
      #
      # WARN MODE (current): the step emits a workflow warning if the
      # tag is unsigned or its signature cannot be verified, but does
      # NOT fail the workflow. The runner has no maintainer pubkeys
      # imported yet so every tag will WARN for now; this is the
      # intended transitional state.
      #
      # TODO (2026-06-03): flip this step to FAIL mode in a follow-up
      # PR. The follow-up must (a) import the maintainer GPG public
      # key from a secret (e.g. ${{ secrets.MAINTAINER_GPG_PUBKEY }})
      # into the runner keyring before `git tag -v`, and (b) drop the
      # `|| echo` fallthrough so a verification failure exits non-zero
      # and short-circuits the publish step.
      # ----------------------------------------------------------------
      - name: Verify signed tag (WARN mode, FAIL gate 2026-06-03)
        # WARN MODE: never fail the workflow. The `git tag -v ... || echo`
        # idiom keeps the step exit code 0 even when the tag is unsigned.
        run: git tag -v "$GITHUB_REF_NAME" || echo "::warning::Tag $GITHUB_REF_NAME is not signed or its signature could not be verified. This is currently a WARN; on 2026-06-03 this step will FAIL closed per issue #890."

      - name: Install build tools
        run: pip install build twine

      - name: Build distribution
        run: python -m build

      - name: Validate metadata
        # Fails with non-zero exit code if metadata is malformed.
        # Workflow does NOT proceed to publish if this step fails.
        run: twine check dist/*

      - name: Publish to PyPI (Trusted Publisher / OIDC)
        # Requires Trusted Publisher configured at https://pypi.org/manage/account/publishing/
        # Link this GitHub repo + workflow filename as the trusted publisher source.
        uses: pypa/gh-action-pypi-publish@release/v1

      # --- ALTERNATIVE: API Token (if Trusted Publisher is not configured) ---
      # Replace the above step with:
      # - name: Publish to PyPI (API Token)
      #   env:
      #     TWINE_USERNAME: __token__
      #     TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
      #   run: twine upload dist/*
