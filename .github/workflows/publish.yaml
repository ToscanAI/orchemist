name: Publish to PyPI

# NOTE: This workflow triggers on any v*.*.* tag push (branch-agnostic).
# Convention: only create version tags from the main branch.
# See: https://github.com/ToscanAI/orchestration-engine/blob/main/CONTRIBUTING.md
on:
  push:
    tags:
      - "v*.*.*"

jobs:
  build-and-publish:
    name: Build and publish to PyPI
    runs-on: ubuntu-latest
    environment: pypi  # optional GitHub environment for approval gate
    permissions:
      id-token: write  # required for OIDC Trusted Publisher
      contents: read   # required to checkout the repository

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # Fetch the tag object (not just the commit) so `git tag -v`
          # can read the signature payload.
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ----------------------------------------------------------------
      # Signed-tag verification — issue #890 (FAIL-closed since #935).
      #
      # The release tag is verified against the committed release-signing
      # public key: the next two steps import it and run `git tag -v` with
      # NO fallthrough, so an unsigned or unverifiable tag exits non-zero
      # and short-circuits build + publish. The maintainer public key lives
      # in-repo at .github/release-signing-pubkey.asc (not a secret) for
      # auditability.
      # ----------------------------------------------------------------
      - name: Import release-signing public key
        # Public key committed at .github/release-signing-pubkey.asc
        # (fpr E3A2819B37178D9844E45AD1FD72AF771848CF42). Importing it lets the
        # next step verify the tag signature against a known maintainer key.
        run: gpg --import .github/release-signing-pubkey.asc

      - name: Verify signed tag (FAIL-closed)
        # FAIL-CLOSED (#890): the release tag MUST carry a good GPG signature
        # from a key imported above. An unsigned tag, or one signed by an
        # unlisted key, fails here and blocks build + publish.
        # Block scalar (`run: |`) is required — an inline plain scalar would
        # treat a space-prefixed '#' issue ref as a YAML comment and break the
        # command (regression history: #934).
        run: |
          git tag -v "$GITHUB_REF_NAME"

      - name: Install build tools
        run: pip install build twine

      - name: Build distribution
        run: python -m build

      - name: Validate metadata
        # Fails with non-zero exit code if metadata is malformed.
        # Workflow does NOT proceed to publish if this step fails.
        run: twine check dist/*

      - name: Publish to PyPI (Trusted Publisher / OIDC)
        # Requires Trusted Publisher configured at https://pypi.org/manage/account/publishing/
        # Link this GitHub repo + workflow filename as the trusted publisher source.
        uses: pypa/gh-action-pypi-publish@release/v1

      # --- ALTERNATIVE: API Token (if Trusted Publisher is not configured) ---
      # Replace the above step with:
      # - name: Publish to PyPI (API Token)
      #   env:
      #     TWINE_USERNAME: __token__
      #     TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
      #   run: twine upload dist/*
