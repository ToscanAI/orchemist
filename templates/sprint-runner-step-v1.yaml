id: sprint-runner-step-v1
name: "Sprint Runner v1 (B — Step)"
description: "Meta-template ping-pong partner to sprint-runner-v1. Reads remaining issues from parent's prepare.json, runs the full coding pipeline for the next issue, then chains back to sprint-runner-v1. Terminates when the remaining issues list is empty."
author: "Toscan"
version: "1.1.0"
scenario: scenarios/sprint-runner-step-v1-smoke.yaml
category: "code"
tags: [code, sprint, meta-template, chaining]
use_cases:
  - "Continuation step in sprint runner ping-pong chain"

config_schema:
  type: object
  required: [sprint_name, repo_path, repo_url, parent_output_dir]
  properties:
    sprint_name:
      type: string
      description: "Human-readable sprint name"
    repo_path:
      type: string
      description: "Absolute path to the repository on disk"
    repo_url:
      type: string
      description: "GitHub repo URL (e.g. https://github.com/owner/repo)"
    parent_output_dir:
      type: string
      description: "Output directory of the preceding sprint-runner-v1 run — contains prepare.json with remaining_issues"
    test_command:
      type: string
      default: "python3 -m pytest tests/ -x -q"
      description: "Command to run tests"
    language:
      type: string
      default: "python"
    style_guide:
      type: string
      default: "Follow existing code style. Add docstrings. Type hints where practical."

phases:
  # Phase 0: Prepare — read remaining issues from parent's prepare.json, pop next
  - id: prepare
    name: "Prepare: Extract Next Issue from Remaining"
    description: "Read remaining_issues from parent prepare.json, pop the first, fetch details via gh CLI, write own prepare.json. Exits non-zero if remaining list is empty — terminates the chain. Config values are passed as sys.argv (not interpolated into Python code) to prevent injection."
    task_type: command
    command: >-
      python3 -c "
      import json, sys, subprocess, os

      # Config values passed as argv to prevent interpolation into Python code
      # argv: [script, parent_output_dir, sprint_name, repo_path, repo_url, output_dir]
      parent_output_dir  = sys.argv[1]
      sprint_name        = sys.argv[2]
      repo_path          = sys.argv[3]
      repo_url           = sys.argv[4]
      output_dir         = sys.argv[5]

      parent_prepare_path = os.path.join(parent_output_dir, 'prepare.json')

      if not os.path.exists(parent_prepare_path):
          print(f'parent prepare.json not found at {{parent_prepare_path}}', file=sys.stderr)
          sys.exit(1)

      with open(parent_prepare_path) as f:
          parent_prepare = json.load(f)

      remaining = parent_prepare.get('remaining_issues', [])

      # Validate: all entries must be positive integers
      for item in remaining:
          if not isinstance(item, int) or item <= 0:
              print(f'Invalid issue number: {{item!r}} — must be a positive integer', file=sys.stderr)
              sys.exit(1)

      if not remaining:
          print('No more issues to process — sprint complete.', file=sys.stderr)
          sys.exit(1)

      current = remaining[0]
      new_remaining = remaining[1:]

      result = subprocess.run(
          ['gh', 'issue', 'view', str(current), '--repo', repo_url, '--json', 'title,body,number'],
          capture_output=True, text=True
      )
      if result.returncode != 0:
          print(f'Error fetching issue {{current}}: {{result.stderr}}', file=sys.stderr)
          sys.exit(1)

      issue_data = json.loads(result.stdout)
      prepare = {{
          'current_issue': issue_data,
          'remaining_issues': new_remaining,
          'sprint_name': sprint_name,
          'repo_path': repo_path,
          'repo_url': repo_url,
      }}

      os.makedirs(output_dir, exist_ok=True)
      with open(os.path.join(output_dir, 'prepare.json'), 'w') as f:
          json.dump(prepare, f, indent=2)

      print(json.dumps(prepare))
      " {config[parent_output_dir]} {config[sprint_name]} {config[repo_path]} {config[repo_url]} {output_dir}
    allowed_commands: ["python3"]
    transitions:
      success: spec

  # Phase 1: Spec Interpretation
  - id: spec
    name: "Spec Interpretation"
    description: "Understand the issue and produce a clear implementation plan"
    model_tier: opus
    thinking_level: medium
    transitions:
      success: implement
    prompt_template: |
      [PIPELINE CONTEXT] You are executing the SPEC phase (1/4) of an automated sprint coding pipeline. Your output feeds the implement phase — not a human. Do not ask questions, request clarification, or send messages to external channels. Deliver your complete output as structured text following the format below. [/PIPELINE CONTEXT]

      You are a senior developer interpreting a GitHub issue into an implementation spec.

      ## Sprint
      **Name:** {config[sprint_name]}

      ## Current Issue
      Read the current issue details from: {output_dir}/prepare.json
      (Fields: current_issue.number, current_issue.title, current_issue.body)

      ## Repository
      **Path:** {config[repo_path]}
      **Language:** {config[language]}

      ## Task
      1. Read {output_dir}/prepare.json to get the current issue details
      2. Produce a clear implementation spec:

         **Problem Statement** — What exactly needs to change and why
         **Files to Modify** — List each file with what changes are needed
         **Files to Create** — Any new files with their purpose
         **Implementation Steps** — Ordered steps, specific enough to code from
         **Test Plan** — What tests to add/modify, edge cases to cover
         **Risk Assessment** — What could break, backward compatibility concerns

      Write your spec to {output_dir}/spec.md

  # Phase 2: Implementation
  - id: implement
    name: "Implementation"
    description: "Write the code changes based on the spec"
    model_tier: sonnet
    thinking_level: high
    transitions:
      success: review
    prompt_template: |
      [PIPELINE CONTEXT] You are executing the IMPLEMENT phase (2/4) of an automated sprint coding pipeline. Your output feeds the review phase — not a human. Do not ask questions, request clarification, or send messages to external channels. Deliver your complete output as structured text following the format below. [/PIPELINE CONTEXT]

      You are a developer implementing changes based on a spec.

      ## Previous Work
      {phase_summary}

      Read the spec at: {output_dir}/spec.md
      Read the issue details at: {output_dir}/prepare.json

      ## Repository
      **Path:** {config[repo_path]}
      **Style:** {config[style_guide]}

      ## Task
      1. Read the spec and prepare.json carefully to get branch_name (use issue number: feat/issue-<number>)
      2. Switch to the feature branch:
         - Try `git checkout feat/issue-<number>` (if branch exists)
         - If it doesn't exist: `git checkout -b feat/issue-<number>`
         - Do NOT write code on main.
      3. Implement ALL changes described in the spec
      4. Write clean, documented code following the style guide
      5. Commit with message referencing the issue: `feat(#<issue_number>): description`
      6. Run the test command to verify: `{config[test_command]}`
      7. Push your branch: `git push --set-upstream origin feat/issue-<number>`

      ## Output
      Write a summary to {output_dir}/implement.md including:
      - Files changed with brief description
      - Any deviations from the spec and why
      - Test results (pass/fail count)
      - Commit hash

  # Phase 3: Code Review
  - id: review
    name: "Opus Code Review"
    description: "Senior code review by Opus — quality gate with APPROVE/REQUEST_CHANGES verdict"
    model_tier: opus
    thinking_level: high
    max_iterations: 3
    supervisor: true
    supervisor_model: opus
    supervisor_rubric: |
      Evaluate the code review quality:
      - Did it identify real issues vs nitpicks?
      - Are security concerns addressed?
      - Is backward compatibility verified?
      - Are the suggested fixes actionable?
    transitions:
      approve: test
      request_changes: fix
      abort: fix
      success: test
    prompt_template: |
      [PIPELINE CONTEXT] You are executing the REVIEW phase (3/4) of an automated sprint coding pipeline. Your verdict determines whether the code proceeds to testing or goes back for fixes. Do not ask questions, request clarification, or send messages to external channels. [/PIPELINE CONTEXT]

      You are a senior code reviewer (Opus-tier).

      ## Previous Work
      {phase_summary}

      Read the implementation summary at: {output_dir}/implement.md
      Read the spec at: {output_dir}/spec.md
      Read the issue details at: {output_dir}/prepare.json

      ## Repository
      **Path:** {config[repo_path]}

      ## Task
      1. Checkout the feature branch (see implement.md for branch name)
      2. Run `git diff main...HEAD` to see all changes
      3. Review every changed file for correctness, security, edge cases, backward compatibility, test coverage
      4. Run the tests: `{config[test_command]}`

      ## Output
      Write your review to {output_dir}/review.md.

      **IMPORTANT:** Your response MUST start with one of these verdicts on the very first line:
      - `APPROVE` — code is ready to merge
      - `REQUEST_CHANGES` — one or more blockers or major issues found

      Line 1: APPROVE  -or-  REQUEST_CHANGES  (nothing else on this line)

      Then for each issue: `[SEVERITY][category] description`
      Where SEVERITY is: BLOCKER, MAJOR, MINOR, NITPICK

  # Phase 4: Fix Review Feedback
  - id: fix
    name: "Apply Review Fixes"
    description: "Address code review feedback, then loop back to review"
    model_tier: sonnet
    thinking_level: low
    max_iterations: 3
    transitions:
      success: review
    prompt_template: |
      [PIPELINE CONTEXT] You are executing the FIX phase of an automated sprint coding pipeline. Your output feeds a re-review — not a human. [/PIPELINE CONTEXT]

      You are a developer addressing code review feedback.

      ## Previous Work
      {phase_summary}

      Read the code review at: {output_dir}/review.md
      Read the original spec at: {output_dir}/spec.md
      Read the issue details at: {output_dir}/prepare.json

      ## Repository
      **Path:** {config[repo_path]}

      ## Task
      1. Checkout the feature branch (see review.md or implement.md for branch name)
      2. Read the code review carefully
      3. If APPROVE with no blockers — write "No fixes needed" to {output_dir}/fix.md and stop
      4. If REQUEST_CHANGES — apply ALL fixes for blockers and major issues only (minimal diff)
      5. Run tests: `{config[test_command]}`
      6. Commit fixes: `fix: address code review feedback`
      7. Push branch

      ## Output
      Write to {output_dir}/fix.md:
      - Each issue addressed and how
      - Any issues intentionally deferred and why
      - Updated test results
      - Commit hash

  # Phase 5: Test Verification
  - id: test
    name: "Test Verification"
    description: "Run full test suite to verify no regressions"
    task_type: command
    command: "{config[test_command]}"
    working_dir: "{config[repo_path]}"
    allowed_commands: ["python3", "python", "pytest"]

on_complete:
  max_chain_depth: 12
  success:
    - template: sprint-runner-v1
      input_map:
        sprint_name: "{{sprint_name}}"
        repo_path: "{{repo_path}}"
        repo_url: "{{repo_url}}"
        parent_output_dir: "{{output_dir}}"
        issues_json: "[]"
        test_command: "{{test_command}}"
        language: "{{language}}"
        style_guide: "{{style_guide}}"
  failed: []
