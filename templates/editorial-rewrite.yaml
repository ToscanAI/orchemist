id: editorial_rewrite
name: "Editorial Rewrite Pipeline"
description: "Takes an existing article and editorial brief, rewrites with new material, then runs through sequential quality gates: flow review → red team → consistency → final polish. Each phase fixes issues from the previous, building toward truth. Uses file-handoff via {output_dir} to avoid output truncation."
author: "Toscan"
version: "2.0.0"
category: "content"
tags: [content, editorial, rewrite, fact-checking, red-team, file_handoff]
use_cases:
  - "Expanding an existing article with new themes"
  - "Editorial revision with quality pipeline"
  - "Article evolution with competitive/research data"
example_input:
  source_article: "[full text of existing article]"
  editorial_brief: "Add humor per Jennifer Aaker framework, weave in competitive landscape, expand orchestrator framing beyond content"
  research_data: "[research synthesis from competitive research pipeline]"
  author_name: "Conny Lazo"
  author_facts: "[author biographical facts]"
  audience: "technical leaders and AI practitioners"
  tone: "professional with humor"
  word_count: 3000
  publication: "LinkedIn newsletter / blog"

config_schema:
  type: object
  required: [source_article, editorial_brief, research_data, author_name, author_facts]
  properties:
    source_article:
      type: string
      description: "The full text of the existing article to rewrite/expand"
    editorial_brief:
      type: string
      description: "Specific additions, changes, and themes to weave in"
    research_data:
      type: string
      description: "Research synthesis to incorporate (from research pipeline)"
    author_name:
      type: string
      description: "Author's name for byline and first-person references"
    author_facts:
      type: string
      description: "Author-provided biographical facts. Agents MUST use these verbatim — never invent."
    audience:
      type: string
      default: "technical leaders"
    tone:
      type: string
      default: "professional"
    word_count:
      type: integer
      default: 3000
    publication:
      type: string
      default: "blog"

phases:
  - id: editorial_rewrite
    name: "Editorial Rewrite"
    description: "Rewrite the article incorporating new material and editorial direction"
    model_tier: sonnet
    prompt_template: |
      You are a senior editor and writer. You have an excellent published article that needs to evolve with new material and editorial direction.

      ## Source Article
      {config[source_article]}

      ## Editorial Brief
      {config[editorial_brief]}

      ## Research Data (new material to incorporate)
      {config[research_data]}

      ## Author: {config[author_name]}

      ## CRITICAL: Author-Provided Facts
      Use ONLY these for any first-person claims, anecdotes, or biographical details. Do NOT invent:
      {config[author_facts]}

      ## Task
      Rewrite the article incorporating:
      1. All editorial brief directives
      2. Relevant research data with INLINE CITATIONS for every factual claim
      3. The existing article's strongest sections (preserve what works)
      4. Target: {config[word_count]} words, {config[tone]} tone, for {config[audience]}

      ## Rules
      - Preserve the author's voice and first-person perspective
      - Every factual claim needs a source citation
      - First-person anecdotes MUST come from author_facts — never invent
      - Weave new material naturally — don't bolt it on
      - If the editorial brief asks for humor, make it organic, not forced
      - The article should feel like a natural evolution, not a Frankenstein

      ## OUTPUT INSTRUCTIONS
      **CRITICAL:** Write your COMPLETE rewritten article to: {output_dir}/editorial_rewrite.md
      Do NOT truncate. Write the entire article.
      After writing, confirm the file was saved and return a brief summary of changes made.

  - id: flow_review
    name: "Flow Review & Fix"
    description: "Review logical flow and readability, then apply fixes"
    depends_on: [editorial_rewrite]
    model_tier: sonnet
    prompt_template: |
      You are an editor reviewing for logical flow and readability.

      Read the article from: {output_dir}/editorial_rewrite.md

      ## Review Checklist
      - Argument progression — does each section build on the previous?
      - Paragraph transitions — smooth or jarring?
      - Section coherence — does each section have a clear purpose?
      - Conclusion strength — does it land?
      - Humor integration — does it land naturally or feel forced?
      - Pacing — any sections that drag or rush?

      ## Task
      1. List every flow issue you find with specific locations
      2. Apply ALL fixes to the article
      3. Write the CORRECTED version — not just the issues list

      ## OUTPUT INSTRUCTIONS
      Write your COMPLETE corrected article to: {output_dir}/flow_fixed.md
      The article should read better than the input. Preserve voice and content, fix the flow.
      After writing, return a brief summary of issues found and fixes applied.

  - id: red_team
    name: "Red Team Review & Fix"
    description: "Adversarial review for claims, tone, and biographical accuracy — then fix"
    depends_on: [flow_review]
    model_tier: opus
    prompt_template: |
      You are an adversarial reviewer. Your job is to find every weakness, then fix it.

      Read the current article from: {output_dir}/flow_fixed.md

      ## Author-Provided Facts (ground truth)
      {config[author_facts]}

      ## Review Checklist
      1. Unsupported claims — every factual statement needs a source citation
      2. Logical fallacies
      3. Tone issues and potential backlash from practitioners in ANY domain mentioned
      4. Missing counterarguments
      5. HALLUCINATED BIOGRAPHY — compare every first-person claim against author facts. Flag ANY detail not found as FABRICATED.
      6. Invented quotes or statistics
      7. Competitive claims — are comparisons with other tools fair and accurate?
      8. Humor — does it enhance or undermine credibility?

      ## Task
      1. Score backlash risk 0-100
      2. List every problematic phrase with explanation
      3. Apply ALL fixes to the article — soften problematic claims, add nuance, remove unsupported statements
      4. Write the CORRECTED version

      Keep the core argument and humor intact. Do NOT water down the article's personality — fix the problems, not the voice.

      ## OUTPUT INSTRUCTIONS
      Write your COMPLETE corrected article to: {output_dir}/red_team_fixed.md
      After writing, return the backlash score and a summary of issues found and fixes applied.

  - id: consistency
    name: "Consistency Check & Fix"
    description: "Verify factual consistency and citation compliance — then fix"
    depends_on: [red_team]
    model_tier: sonnet
    prompt_template: |
      You are a fact-checker and consistency editor.

      Read the current article from: {output_dir}/red_team_fixed.md

      ## Author-Provided Facts (ground truth)
      {config[author_facts]}

      ## Review Checklist
      1. Numbers match across sections
      2. Claims align with cited sources
      3. No contradictions between paragraphs
      4. Technical terms used consistently
      5. EVERY factual claim has an inline citation
      6. ALL first-person anecdotes match author facts exactly
      7. Competitive comparisons are fair and sourced
      8. No fabricated quotes or statistics

      ## Task
      1. List every inconsistency found
      2. Apply ALL fixes to the article
      3. Write the CORRECTED version

      ## OUTPUT INSTRUCTIONS
      Write your COMPLETE corrected article to: {output_dir}/consistency_fixed.md
      After writing, return a summary of inconsistencies found and fixes applied.

  - id: final_polish
    name: "Final Polish"
    description: "Final read-through — voice, personality, and publication readiness"
    depends_on: [consistency]
    model_tier: sonnet
    prompt_template: |
      You are the senior editor doing the final read before publication.

      Read the article from: {output_dir}/consistency_fixed.md

      This article has been through:
      1. Editorial rewrite (new material incorporated)
      2. Flow review and fix (readability improved)
      3. Red team review and fix (claims hardened, backlash risks addressed)
      4. Consistency check and fix (facts verified, citations confirmed)

      ## Final Pass Checklist
      - Does the opening hook grab attention?
      - Does the voice feel authentic to {config[author_name]}?
      - Is the humor effective or should any jokes be cut?
      - Are there any remaining weak spots?
      - Is it ready for {config[publication]}?
      - Word count within 10% of {config[word_count]}?

      ## Task
      Make final adjustments only. Do NOT rewrite — the hard work is done. Polish, tighten, ensure it reads as one cohesive piece.

      ## OUTPUT INSTRUCTIONS
      **CRITICAL:** Write the FINAL publication-ready article to: {output_dir}/final_article.md
      This is the deliverable. Do NOT truncate.
      After writing, return a brief editorial note: what's strong, any remaining concerns, publication readiness score (0-100).
