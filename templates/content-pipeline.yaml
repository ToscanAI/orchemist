id: content-pipeline-v23
name: "Content Pipeline v2.3"
description: "Full content production pipeline with research, drafting, multi-reviewer feedback, parallel final drafts, and best-selection."
author: "Toscan"
version: "2.3.0"
category: "content"
tags: [content, writing, articles, fact-checking, red-team]
use_cases:
  - "Blog articles with fact-checking"
  - "LinkedIn newsletter content"
  - "Technical writing with peer review"
example_input:
  topic: "AI agents in production"
  audience: "technical leaders"
  tone: "professional"
  word_count: 1500
  publication: "blog"

config_schema:
  type: object
  required: [topic]
  properties:
    topic:
      type: string
      description: "What to write about"
    audience:
      type: string
      default: "general"
      description: "Target audience"
    tone:
      type: string
      default: "professional"
      description: "Writing tone"
    word_count:
      type: integer
      default: 1500
      description: "Target word count"
    publication:
      type: string
      default: "blog"
      description: "Where this will be published"

phases:
  - id: research
    name: "Research"
    description: "Gather sources on the topic"
    model_tier: sonnet
    thinking_level: low
    prompt_template: "Research the topic '{config.topic}' for a {config.audience} audience. Find 5-10 credible sources. For each source provide: title, URL, key findings, and relevance. Focus on recent data and expert opinions."

  - id: outline
    name: "Outline"
    description: "Create article structure"
    model_tier: sonnet
    thinking_level: medium
    depends_on: [research]
    human_review: true
    prompt_template: "Based on the research:\n\n{research.output}\n\nCreate a detailed outline for a {config.word_count}-word {config.tone} article about '{config.topic}' for {config.audience}. Include: headline, subheadings, key points per section, and suggested quotes/data points."

  - id: draft
    name: "Draft"
    description: "Write full article"
    model_tier: sonnet
    thinking_level: medium
    depends_on: [research, outline]
    prompt_template: "Write a {config.word_count}-word {config.tone} article for {config.publication} about '{config.topic}' targeting {config.audience}.\n\nResearch:\n{research.output}\n\nOutline:\n{outline.output}\n\nWrite the complete article following the outline. Use data and quotes from research. Match the tone throughout."

  - id: flow-review
    name: "Flow Review"
    description: "Check logical flow and readability"
    model_tier: sonnet
    thinking_level: low
    depends_on: [draft]
    prompt_template: "Review this article for logical flow and readability:\n\n{draft.output}\n\nCheck: argument progression, paragraph transitions, section coherence, conclusion strength. List specific issues with line references and suggested fixes."

  - id: red-team
    name: "Red Team"
    description: "Adversarial review for claims and tone"
    model_tier: opus
    thinking_level: medium
    depends_on: [draft]
    human_review: true
    prompt_template: "You are an adversarial reviewer. Critically analyze this article:\n\n{draft.output}\n\nCheck for: unsupported claims, logical fallacies, tone issues, potential backlash from practitioners, missing counterarguments. Score backlash risk 0-100. List every problematic phrase with explanation."

  - id: consistency
    name: "Consistency Check"
    description: "Verify factual consistency"
    model_tier: sonnet
    thinking_level: low
    depends_on: [draft]
    prompt_template: "Check this article for factual consistency:\n\n{draft.output}\n\nVerify: numbers match across sections, claims align with cited sources, no contradictions between paragraphs, technical terms used consistently. List any inconsistencies found."

  - id: final-7a
    name: "Final Draft 7a - Flow Fixes"
    description: "Apply flow review fixes"
    model_tier: haiku
    thinking_level: low
    depends_on: [draft, flow-review]
    prompt_template: "Apply these flow fixes to the article:\n\nOriginal:\n{draft.output}\n\nFlow issues:\n{flow-review.output}\n\nRewrite the article incorporating all flow fixes. Preserve the original voice and content."

  - id: final-7b
    name: "Final Draft 7b - Red Team Fixes"
    description: "Apply red team fixes"
    model_tier: sonnet
    thinking_level: low
    depends_on: [draft, red-team]
    prompt_template: "Apply these red team fixes to the article:\n\nOriginal:\n{draft.output}\n\nRed team issues:\n{red-team.output}\n\nRewrite addressing all concerns. Soften problematic claims, add nuance, remove unsupported statements. Keep the core argument intact."

  - id: final-7c
    name: "Final Draft 7c - Consistency Fixes"
    description: "Apply consistency fixes"
    model_tier: haiku
    thinking_level: low
    depends_on: [draft, consistency]
    prompt_template: "Apply these consistency fixes to the article:\n\nOriginal:\n{draft.output}\n\nConsistency issues:\n{consistency.output}\n\nFix all inconsistencies. Ensure numbers, terms, and claims are consistent throughout."

  - id: select-best
    name: "Select Best Draft"
    description: "Compare three drafts and select the best"
    model_tier: opus
    thinking_level: medium
    depends_on: [final-7a, final-7b, final-7c]
    prompt_template: "Compare these three final drafts and select the best one:\n\nDraft A (flow-focused):\n{final-7a.output}\n\nDraft B (red-team-hardened):\n{final-7b.output}\n\nDraft C (consistency-fixed):\n{final-7c.output}\n\nEvaluate each on: accuracy, readability, tone, argument strength, backlash risk. Select the best and output it in full. Explain your choice briefly at the top."
