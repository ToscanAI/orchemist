id: content-pipeline-v24
name: "Content Pipeline v2.4"
description: "Full content production pipeline with research, drafting, multi-reviewer feedback, parallel final drafts, and best-selection. v2.4 adds author_facts (anti-hallucination), author_name, and inline citation requirements."
author: "Toscan"
version: "2.4.0"
category: "content"
tags: [content, writing, articles, fact-checking, red-team]
use_cases:
  - "Blog articles with fact-checking"
  - "LinkedIn newsletter content"
  - "Technical writing with peer review"
example_input:
  topic: "AI agents in production"
  author_name: "René Rivera"
  author_facts: "I run an 8-agent orchestration system. I built it in February 2026 using OpenClaw + Claude. My first pipeline ran 9 agents across 8 phases in 15 minutes. I learned that agents skip steps when unsupervised — the orchestrator exists to enforce the process."
  audience: "technical leaders"
  tone: "professional"
  word_count: 1500
  publication: "blog"

config_schema:
  type: object
  required: [topic, author_name, author_facts]
  properties:
    topic:
      type: string
      description: "What to write about"
    author_name:
      type: string
      description: "Author's name — used in byline and first-person references. Never hardcode."
    author_facts:
      type: string
      description: "Author-provided personal anecdotes, dates, corrections. Agents MUST use these verbatim — never invent, embellish, or approximate biographical details."
    audience:
      type: string
      default: "general"
      description: "Target audience"
    tone:
      type: string
      default: "professional"
      description: "Writing tone"
    word_count:
      type: integer
      default: 1500
      description: "Target word count"
    publication:
      type: string
      default: "blog"
      description: "Where this will be published"

phases:
  - id: research
    name: "Research"
    description: "Gather sources on the topic"
    model_tier: sonnet
    thinking_level: low
    prompt_template: "Research the topic '{config.topic}' for a {config.audience} audience. Find 5-10 credible sources. For each source provide: title, URL, key findings, and relevance. Focus on recent data and expert opinions."

  - id: outline
    name: "Outline"
    description: "Create article structure"
    model_tier: sonnet
    thinking_level: medium
    depends_on: [research]
    human_review: true
    prompt_template: "Based on the research:\n\n{research.output}\n\nCreate a detailed outline for a {config.word_count}-word {config.tone} article about '{config.topic}' for {config.audience}. Include: headline, subheadings, key points per section, and suggested quotes/data points."

  - id: draft
    name: "Draft"
    description: "Write full article"
    model_tier: sonnet
    thinking_level: medium
    depends_on: [research, outline]
    prompt_template: "Write a {config.word_count}-word {config.tone} article for {config.publication} about '{config.topic}' targeting {config.audience}.\n\nAuthor: {config.author_name}\n\n## CRITICAL: Author-Provided Facts\nUse ONLY the following author-provided facts for any first-person claims, anecdotes, or biographical details. Do NOT invent, embellish, or approximate any personal details:\n\n{config.author_facts}\n\n## Research\n{research.output}\n\n## Outline\n{outline.output}\n\n## Requirements\n1. Follow the outline structure\n2. Use data and quotes from research with INLINE CITATIONS — every factual claim must reference its source in the text (e.g., 'According to [Source Name]...' or '...as reported by [Source]')\n3. Any first-person anecdote MUST come verbatim from the author facts above\n4. Match the tone throughout\n5. Do NOT fabricate quotes, statistics, or personal stories"

  - id: flow-review
    name: "Flow Review"
    description: "Check logical flow and readability"
    model_tier: sonnet
    thinking_level: low
    depends_on: [draft]
    prompt_template: "Review this article for logical flow and readability:\n\n{draft.output}\n\nCheck: argument progression, paragraph transitions, section coherence, conclusion strength. List specific issues with line references and suggested fixes."

  - id: red-team
    name: "Red Team"
    description: "Adversarial review for claims and tone"
    model_tier: opus
    thinking_level: medium
    depends_on: [draft]
    human_review: true
    prompt_template: "You are an adversarial reviewer. Critically analyze this article:\n\n{draft.output}\n\n## Author-Provided Facts (ground truth)\n{config.author_facts}\n\nCheck for:\n1. Unsupported claims — every factual statement needs a source citation\n2. Logical fallacies\n3. Tone issues and potential backlash from practitioners\n4. Missing counterarguments\n5. HALLUCINATED BIOGRAPHY — compare every first-person claim, anecdote, date, or personal detail against the author-provided facts above. Flag ANY detail not found in the author facts as FABRICATED.\n6. Invented quotes or statistics not traceable to research sources\n\nScore backlash risk 0-100. List every problematic phrase with explanation. Pay special attention to biographical accuracy."

  - id: consistency
    name: "Consistency Check"
    description: "Verify factual consistency"
    model_tier: sonnet
    thinking_level: low
    depends_on: [draft]
    prompt_template: "Check this article for factual consistency and citation compliance:\n\n{draft.output}\n\n## Author-Provided Facts (ground truth)\n{config.author_facts}\n\nVerify:\n1. Numbers match across sections\n2. Claims align with cited sources\n3. No contradictions between paragraphs\n4. Technical terms used consistently\n5. EVERY factual claim has an inline citation (source name or link)\n6. ALL first-person anecdotes match the author-provided facts exactly — flag any that appear invented or embellished\n7. No fabricated quotes or statistics\n\nList any inconsistencies, missing citations, or invented biographical details."

  - id: final-7a
    name: "Final Draft 7a - Flow Fixes"
    description: "Apply flow review fixes"
    model_tier: haiku
    thinking_level: low
    depends_on: [draft, flow-review]
    prompt_template: "Apply these flow fixes to the article:\n\nOriginal:\n{draft.output}\n\nFlow issues:\n{flow-review.output}\n\nRewrite the article incorporating all flow fixes. Preserve the original voice and content."

  - id: final-7b
    name: "Final Draft 7b - Red Team Fixes"
    description: "Apply red team fixes"
    model_tier: sonnet
    thinking_level: low
    depends_on: [draft, red-team]
    prompt_template: "Apply these red team fixes to the article:\n\nOriginal:\n{draft.output}\n\nRed team issues:\n{red-team.output}\n\nRewrite addressing all concerns. Soften problematic claims, add nuance, remove unsupported statements. Keep the core argument intact."

  - id: final-7c
    name: "Final Draft 7c - Consistency Fixes"
    description: "Apply consistency fixes"
    model_tier: haiku
    thinking_level: low
    depends_on: [draft, consistency]
    prompt_template: "Apply these consistency fixes to the article:\n\nOriginal:\n{draft.output}\n\nConsistency issues:\n{consistency.output}\n\nFix all inconsistencies. Ensure numbers, terms, and claims are consistent throughout."

  - id: select-best
    name: "Select Best Draft"
    description: "Compare three drafts and select the best"
    model_tier: opus
    thinking_level: medium
    depends_on: [final-7a, final-7b, final-7c]
    prompt_template: "Compare these three final drafts and select the best one:\n\nDraft A (flow-focused):\n{final-7a.output}\n\nDraft B (red-team-hardened):\n{final-7b.output}\n\nDraft C (consistency-fixed):\n{final-7c.output}\n\nEvaluate each on: accuracy, readability, tone, argument strength, backlash risk. Select the best and output it in full. Explain your choice briefly at the top."
