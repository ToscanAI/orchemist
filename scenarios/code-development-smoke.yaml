# code-development-smoke.yaml — Smoke test for the Code Development Pipeline template
#
# Purpose:
#   Validates that the code-development-pipeline.yaml template produces a
#   structurally correct software development output: requirements analysis,
#   implementation with code review, fixes, and test generation.
#
# How to run:
#   # Dry-run mode (CI-safe, no API key needed):
#   ORCH_DRY_RUN=1 orch scenario run code-development-smoke --dry-run
#
#   # Live mode (requires ANTHROPIC_API_KEY):
#   orch scenario run code-development-smoke
#
# Acceptance criteria design:
#   - Gate (assertion, weight 0):   output dict is non-empty → blocks scoring if pipeline stalled
#   - Scored keyword  (weight 40):  structural content check — keywords always present in both
#                                   dry-run ("mock", "execution", "content") and real LLM output
#                                   ("requirements", "implementation", "APPROVE", "test")
#   - Scored llm_judge (weight 60): code-dev quality rubric — returns stub score 0.8 when
#                                   ORCH_DRY_RUN=1, makes real LLM call otherwise
#
# Scoring:
#   Non-gate weights:  40 + 60 = 100
#   pass_threshold:    0.70
#   Expected dry-run score: (1.0×40 + 0.8×60) / 100 = 0.88  → PASS

id: code-development-smoke
version: "1.0.0"
name: "Code Development Pipeline Smoke Test"
description: >
  Smoke test for the bundled code-development-pipeline template.
  Validates the full 5-phase dev loop: requirements → implement →
  code review → fix → test generation, using a simple Python utility task.
tags:
  - smoke
  - code-development
  - bundled-template

# Template under test.  Path is relative to the repository root.
pipeline: examples/code-development-pipeline.yaml

# Input data passed to the pipeline template
input:
  task_description: "Write a Python utility function that validates email addresses using regex, handles edge cases, and raises a ValueError with a descriptive message for invalid input."
  language: "python"
  test_framework: "pytest"

# ---------------------------------------------------------------------------
# Output structure note
# ---------------------------------------------------------------------------
#
# The grading input ("output") from `orch scenario run` is:
#
#   {
#     "final":  <last-phase output dict>,          # test_generation phase
#     "phases": <dict[phase_id → output dict]>,    # all 5 phases accessible
#   }
#
# The KeywordGrader recurses into nested dicts automatically.
# LLMJudgeGrader falls back to JSON(output) when no canonical text field is found.
#
# ---------------------------------------------------------------------------
# Acceptance criteria
# ---------------------------------------------------------------------------
acceptance:

  # --- Gate (weight 0 = hard gate; failure blocks all scoring) ---
  #
  # The check `len(str(output)) > 10` works for both output shapes:
  #   • CLI shape  {"final": {...}, "phases": {...}}  → always >> 10 chars
  #   • Flat {}  → str("{}") == 2 chars → gate fails  ← empty pipeline guard
  #   • Flat _dry_run_phase_output() → hundreds of chars → gate passes
  #
  - id: output_not_empty
    type: assertion
    check: "len(str(output)) > 10"
    weight: 0
    description: >
      Hard gate: the pipeline must produce a non-trivial output.
      If the pipeline stalls or returns an empty dict this gate fails
      and the entire scenario is marked as failed regardless of other scores.

  # --- Scored criterion 1: KeywordGrader structural check (weight 40) ---
  #
  # match_mode: "any" — at least one keyword must appear in the output text.
  # KeywordGrader recurses into nested dicts, so it finds keywords regardless
  # of whether output is flat or the CLI-structured {"final":...,"phases":...}.
  #
  # Keywords that appear in DRY-RUN mode (DryRunExecutor mock output):
  #   "mock"       → "Mock execution of content task"
  #   "execution"  → same
  #   "content"    → same
  #
  # Keywords that appear in LIVE mode (real LLM output from this template):
  #   "requirements"    → requirements phase output always names acceptance criteria
  #   "implementation"  → implement + fix phases produce implementation sections
  #   "APPROVE"         → code_review phase verdict (APPROVE or REQUEST_CHANGES)
  #   "test"            → test_generation phase always uses the word "test"
  #
  - id: output_structure_check
    type: keyword
    keywords:
      - "requirements"
      - "implementation"
      - "APPROVE"
      - "test"
      - "mock"
      - "execution"
      - "content"
    match_mode: "any"
    threshold: 0.5
    weight: 40
    description: >
      Structural keyword check verifying the output contains recognisable
      content from a code-development pipeline run. Live mode: requirements
      analysis, implementation details, a code review verdict (APPROVE), and
      test generation output. Dry-run mode: mock/execution/content from the
      DryRunExecutor stub. Uses match_mode "any" so a single keyword hit
      scores 1.0. KeywordGrader recurses into nested dicts automatically.

  # --- Scored criterion 2: LLMJudgeGrader quality check (weight 60) ---
  #
  # In dry-run mode (ORCH_DRY_RUN=1) returns stub score 0.8.
  # In live mode makes a real judge API call against the pipeline output.
  #
  - id: output_quality
    type: llm_judge
    judge_model: claude-haiku-4-5-20241022
    rubric: |
      You are evaluating the output of a software development pipeline that processed
      a task to implement a Python email-validation utility function.

      The pipeline ran 5 phases: requirements analysis, implementation, code review,
      fix pass, and test generation. You are scoring the overall output quality.

      Scoring criteria (each worth equal weight):
      1. Requirements coverage — The output references acceptance criteria,
         edge cases, or a structured analysis of what the function must do.
      2. Code presence — The output contains actual Python code (function
         definitions, imports, or test cases), not just prose descriptions.
      3. Review rigour — The output includes a code review verdict or feedback
         (severity labels like BLOCKER/WARNING/NIT, or APPROVE/REQUEST_CHANGES).
      4. Test generation — The output includes test functions, assertions, or
         a pytest test suite targeting the email validator.

      Score on a scale from 0.0 (none of the criteria met) to 1.0 (all four met).

      Respond with ONLY this format (no other text):
      Score: <0.0–1.0>
      Reasoning: <one sentence>
    threshold: 0.60
    weight: 60
    description: >
      LLM-as-judge rubric specific to code development pipelines: checks for
      requirements coverage, actual code output, review findings with severity
      labels, and test generation. Uses ORCH_DRY_RUN stub score (0.8) in CI mode.

# ---------------------------------------------------------------------------
# Scoring
# ---------------------------------------------------------------------------
scoring:
  method: weighted_average
  pass_threshold: 0.70
  gate_mode: all_or_nothing
  notes: >
    Non-gate criteria weights: keyword(40) + llm_judge(60) = 100.
    Expected dry-run weighted score: (1.0×40 + 0.8×60) / 100 = 0.88.
