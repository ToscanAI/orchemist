# coding-pipeline-v1-smoke.yaml — Smoke test for coding-pipeline-v1.yaml
#
# Purpose:
#   Validates that the coding-pipeline-v1 template produces structurally
#   correct output across all 6 phases:
#   spec → acceptance_test → implement → review → fix → test.
#
# Scoring:
#   Non-gate weights: keyword(40) + llm_judge(60) = 100
#   pass_threshold: 0.70
#   Expected dry-run score: (1.0×40 + 0.8×60) / 100 = 0.88 → PASS

id: coding-pipeline-v1-smoke
version: "1.1.0"
name: "Coding Pipeline v1 Smoke Test"
description: >
  Smoke test for the coding-pipeline-v1 template. Validates the 6-phase
  coding loop: spec interpretation → behavioral acceptance tests →
  implementation → Opus code review → fix → test.
  Checks for structural output, acceptance test pass rate, review verdicts,
  and test results.
tags:
  - smoke
  - coding-pipeline
  - v1

pipeline: templates/coding-pipeline-v1.yaml

input:
  issue_number: 999
  issue_title: "Test: Add email validation utility"
  issue_description: "Add a Python utility function that validates email addresses using regex."
  repo_path: "/tmp/test-repo"
  branch_name: "test/email-validation"
  acceptance_criteria: "Function validates emails correctly. Unit tests pass."
  context: "Simple utility function. No external dependencies."

acceptance:
  # Gate: pipeline must produce non-trivial output
  - id: output_not_empty
    type: assertion
    check: "len(str(output)) > 10"
    weight: 0
    description: >
      Hard gate: pipeline must produce non-trivial output.

  # Keyword check for structural content
  - id: structural_keywords
    type: keyword
    keywords:
      # Live mode keywords
      - "spec"
      - "acceptance_test"
      - "behavioral"
      - "acceptance_tests"
      - "produces"
      - "implement"
      - "review"
      - "APPROVE"
      - "test"
      - "fix"
      - "pass_rate"
      # Dry-run mode keywords
      - "mock"
      - "execution"
      - "content"
    match_mode: "any"
    threshold: 0.5
    weight: 40
    description: >
      Structural check: output contains recognisable content from a coding
      pipeline run. Live: spec analysis, behavioral acceptance tests, implementation,
      review verdict (APPROVE/REVISE), fix pass, test results.
      Dry-run: mock executor output.

  # LLM judge for quality
  - id: output_quality
    type: llm_judge
    judge_model: claude-haiku-4-5-20241022
    rubric: |
      You are evaluating the output of a 6-phase coding pipeline.
      The output consists of phase summaries:
        spec → acceptance_test → implement → review → fix → test.
      Code is committed to git — you will see commit references and file change
      descriptions, NOT raw code. This is expected behavior.

      Phases:
      1. Spec interpretation — analyzes the issue, lists files to change, implementation steps
      2. Behavioral Acceptance Tests — writes pytest tests expressing "when I call X with Y,
         it produces Z" contracts BEFORE implementation. Produces acceptance_tests.py and
         acceptance_results.json with pass_rate.
      3. Implementation — implements changes, runs acceptance tests, reports pass_rate and
         commit hash
      4. Code review — APPROVE or REQUEST_CHANGES verdict with reasoning
      5. Fix — addresses review feedback (may be absent if first review approved)
      6. Test — full test suite results with pass/fail counts

      Scoring criteria (equal weight):
      1. Spec completeness — references requirements, files to change, implementation approach
      2. Acceptance tests present — behavioral contracts listed, acceptance_results.json
         with pass_rate field (e.g. "pass_rate: 0.9")
      3. Implementation evidence — describes files changed, functions added/modified,
         acceptance test pass rate, commit hash
      4. Review verdict — APPROVE or REQUEST_CHANGES with substantive reasoning
      5. Test results — pass/fail counts present (e.g. "48 passed", "0 failed")

      Score 0.0 (none met) to 1.0 (all five met).
      If fix phase is absent (first-pass APPROVE), score criteria 1-4 plus test results.
      If acceptance_test phase output is absent (legacy pipeline), score the remaining criteria.

      Respond ONLY:
      Score: <0.0-1.0>
      Reasoning: <one sentence>
    threshold: 0.60
    weight: 60
    description: >
      LLM judge: checks for spec analysis, behavioral acceptance tests, code output,
      review verdict, and test results.

scoring:
  method: weighted_average
  pass_threshold: 0.70
  gate_mode: all_or_nothing
