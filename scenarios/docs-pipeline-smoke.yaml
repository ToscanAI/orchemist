# docs-pipeline-smoke.yaml — Smoke test for the Documentation Pipeline template
#
# Purpose:
#   Validates that the docs-pipeline.yaml template produces a structurally
#   correct documentation output: a structured outline, a complete written
#   document, and a technical review verdict with specific feedback.
#
# How to run:
#   # Dry-run mode (CI-safe, no API key needed):
#   ORCH_DRY_RUN=1 orch scenario run docs-pipeline-smoke --dry-run
#
#   # Live mode (requires ANTHROPIC_API_KEY):
#   orch scenario run docs-pipeline-smoke
#
# Acceptance criteria design:
#   - Gate (assertion, weight 0):   output dict is non-empty → blocks scoring if pipeline stalled
#   - Scored keyword  (weight 40):  structural content check — keywords always present in both
#                                   dry-run ("mock", "execution", "content") and real LLM output
#                                   ("outline", "document", "APPROVE", "markdown")
#   - Scored llm_judge (weight 60): docs quality rubric — returns stub score 0.8 when
#                                   ORCH_DRY_RUN=1, makes real LLM call otherwise
#
# Scoring:
#   Non-gate weights:  40 + 60 = 100
#   pass_threshold:    0.70
#   Expected dry-run score: (1.0×40 + 0.8×60) / 100 = 0.88  → PASS

id: docs-pipeline-smoke
version: "1.0.0"
name: "Documentation Pipeline Smoke Test"
description: >
  Smoke test for the bundled docs-pipeline template.
  Validates the 3-phase documentation loop: research & outline →
  write full document → technical review, using a realistic
  CONTRIBUTING.md as the target document type.
tags:
  - smoke
  - docs-pipeline
  - bundled-template

# Template under test.  Path is relative to the repository root.
pipeline: examples/docs-pipeline.yaml

# Input data passed to the pipeline template
input:
  doc_type: "CONTRIBUTING.md"
  target_file: "CONTRIBUTING.md"
  project_context: "An open-source AI pipeline orchestration engine written in Python. It has a CLI interface, YAML-driven pipeline templates, and a scenario runner with LLM judge grading. Developers can contribute new pipeline templates, graders, or CLI commands."
  requirements: "Cover: development environment setup, running tests with pytest, adding a new pipeline template (YAML schema), writing scenario files, code style (ruff/black), submitting a pull request, and the definition of done for each contribution type."
  max_lines: 300

# ---------------------------------------------------------------------------
# Output structure note
# ---------------------------------------------------------------------------
#
# The grading input ("output") from `orch scenario run` is:
#
#   {
#     "final":  <last-phase output dict>,          # review phase
#     "phases": <dict[phase_id → output dict]>,    # all 3 phases accessible
#   }
#
# The KeywordGrader recurses into nested dicts automatically.
# LLMJudgeGrader falls back to JSON(output) when no canonical text field is found.
#
# ---------------------------------------------------------------------------
# Acceptance criteria
# ---------------------------------------------------------------------------
acceptance:

  # --- Gate (weight 0 = hard gate; failure blocks all scoring) ---
  #
  # The check `len(str(output)) > 10` works for both output shapes:
  #   • CLI shape  {"final": {...}, "phases": {...}}  → always >> 10 chars
  #   • Flat {}  → str("{}") == 2 chars → gate fails  ← empty pipeline guard
  #   • Flat _dry_run_phase_output() → hundreds of chars → gate passes
  #
  - id: output_not_empty
    type: assertion
    check: "len(str(output)) > 10"
    weight: 0
    description: >
      Hard gate: the pipeline must produce a non-trivial output.
      If the pipeline stalls or returns an empty dict this gate fails
      and the entire scenario is marked as failed regardless of other scores.

  # --- Scored criterion 1: KeywordGrader structural check (weight 40) ---
  #
  # match_mode: "any" — at least one keyword must appear in the output text.
  # KeywordGrader recurses into nested dicts, so it finds keywords regardless
  # of whether output is flat or the CLI-structured {"final":...,"phases":...}.
  #
  # Keywords that appear in DRY-RUN mode (DryRunExecutor mock output):
  #   "mock"       → "Mock execution of content task"
  #   "execution"  → same
  #   "content"    → same
  #
  # Keywords that appear in LIVE mode (real LLM output from this template):
  #   "outline"    → research phase always outputs a structured markdown outline
  #   "document"   → write phase and review phase reference the written document
  #   "APPROVE"    → review phase verdict (APPROVE, APPROVE_WITH_CHANGES,
  #                  or REQUEST_CHANGES)
  #   "markdown"   → write phase outputs complete markdown content
  #
  - id: output_structure_check
    type: keyword
    keywords:
      - "outline"
      - "document"
      - "APPROVE"
      - "markdown"
      - "mock"
      - "execution"
      - "content"
    match_mode: "any"
    threshold: 0.5
    weight: 40
    description: >
      Structural keyword check verifying the output contains recognisable
      content from a documentation pipeline run. Live mode: a structured
      outline from the research phase, written document content, and a
      review verdict (APPROVE/APPROVE_WITH_CHANGES/REQUEST_CHANGES).
      Dry-run mode: mock/execution/content from the DryRunExecutor stub.
      Uses match_mode "any" so a single keyword hit scores 1.0. KeywordGrader
      recurses into nested dicts automatically.

  # --- Scored criterion 2: LLMJudgeGrader quality check (weight 60) ---
  #
  # In dry-run mode (ORCH_DRY_RUN=1) returns stub score 0.8.
  # In live mode makes a real judge API call against the pipeline output.
  #
  - id: output_quality
    type: llm_judge
    judge_model: claude-haiku-4-5-20241022
    rubric: |
      You are evaluating the output of a 3-phase documentation pipeline that produced
      a CONTRIBUTING.md for an open-source Python AI orchestration engine.

      The pipeline ran: research & outline → write full document → technical review.
      The requirements asked for: dev setup, pytest instructions, adding pipeline
      templates, writing scenario files, code style, and pull request process.

      Score the overall output quality using these criteria (each worth equal weight):

      1. Structural outline — The output contains an identifiable outline or section
         breakdown (headings, numbered sections, or bullet hierarchy). A flat wall of
         text without structure fails this criterion.
      2. Requirements coverage — At least two of the following topics appear in the
         output: development setup, testing, templates, scenarios, code style,
         pull requests. Only one topic covered scores 0.
      3. Practical examples — The output includes at least one concrete example:
         a shell command, a YAML snippet, a code block, or a file path. Prose-only
         output without examples fails this criterion.
      4. Review verdict — The output includes an explicit review verdict
         (APPROVE, APPROVE_WITH_CHANGES, or REQUEST_CHANGES) from the review phase.

      Score on a scale from 0.0 (none of the criteria met) to 1.0 (all four met).

      Respond with ONLY this format (no other text):
      Score: <0.0–1.0>
      Reasoning: <one sentence>
    threshold: 0.60
    weight: 60
    description: >
      LLM-as-judge rubric specific to documentation pipelines: checks for
      structural outline, requirements coverage breadth, practical examples
      (commands/code), and a review verdict. Uses ORCH_DRY_RUN stub
      score (0.8) in CI mode.

# ---------------------------------------------------------------------------
# Scoring
# ---------------------------------------------------------------------------
scoring:
  method: weighted_average
  pass_threshold: 0.70
  gate_mode: all_or_nothing
  notes: >
    Non-gate criteria weights: keyword(40) + llm_judge(60) = 100.
    Expected dry-run weighted score: (1.0×40 + 0.8×60) / 100 = 0.88.
