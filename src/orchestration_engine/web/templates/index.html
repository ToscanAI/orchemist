<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Orchestration Engine</title>
  <script src="https://unpkg.com/htmx.org@1.9.12/dist/htmx.min.js"></script>
  <style>
    /* ── Reset & base ───────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #0e1117;
      --bg-panel:   #161b22;
      --bg-hover:   #1c2330;
      --bg-active:  #21262d;
      --border:     #30363d;
      --text:       #c9d1d9;
      --text-muted: #8b949e;
      --accent:     #238636;
      --accent-btn: #2ea043;
      --accent-btn-hover: #3fb950;
      --danger:     #da3633;
      --warning:    #e3b341;
      --info:       #58a6ff;
      --radius:     6px;
      --font:       -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 14px;
      line-height: 1.5;
    }

    /* ── Layout ─────────────────────────────────────────────────── */
    #app {
      display: grid;
      grid-template-rows: 48px 1fr 220px;
      grid-template-columns: 220px 1fr;
      grid-template-areas:
        "header  header"
        "sidebar main"
        "log     log";
      height: 100vh;
      overflow: hidden;
    }

    /* ── Header ─────────────────────────────────────────────────── */
    #header {
      grid-area: header;
      background: var(--bg-panel);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 10px;
    }

    #header h1 {
      font-size: 16px;
      font-weight: 600;
      color: var(--text);
    }

    #header .version {
      font-size: 11px;
      color: var(--text-muted);
      background: var(--bg-active);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1px 8px;
    }

    #header .spacer { flex: 1; }

    #header .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--accent);
      display: inline-block;
    }

    /* ── Sidebar ─────────────────────────────────────────────────── */
    #sidebar {
      grid-area: sidebar;
      background: var(--bg-panel);
      border-right: 1px solid var(--border);
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }

    .sidebar-header {
      padding: 12px 16px 8px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .sidebar-section-label {
      padding: 10px 16px 4px;
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
    }

    .refresh-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      padding: 2px 4px;
      border-radius: 3px;
      font-size: 12px;
    }
    .refresh-btn:hover { color: var(--text); background: var(--bg-active); }

    .back-btn {
      display: none;
      background: none;
      border: none;
      color: var(--info);
      cursor: pointer;
      padding: 2px 4px;
      border-radius: 3px;
      font-size: 12px;
    }
    .back-btn:hover { background: var(--bg-active); }
    .back-btn.visible { display: inline-block; }

    /* Sidebar template list (mini list for quick jumping when in detail view) */
    #sidebar-template-list { padding: 4px 0; flex: 1; }

    .sidebar-template-item {
      padding: 7px 16px;
      cursor: pointer;
      border-left: 3px solid transparent;
      transition: background 0.1s;
    }
    .sidebar-template-item:hover { background: var(--bg-hover); }
    .sidebar-template-item.active {
      background: var(--bg-active);
      border-left-color: var(--info);
    }
    .sidebar-template-item .st-name {
      font-size: 12px;
      font-weight: 500;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .sidebar-template-item .st-meta {
      font-size: 10px;
      color: var(--text-muted);
      margin-top: 1px;
    }

    /* ── Main area ───────────────────────────────────────────────── */
    #main {
      grid-area: main;
      overflow-y: auto;
      padding: 0;
      display: flex;
      flex-direction: column;
    }

    /* ── Template Browser (card grid view) ───────────────────────── */
    #template-browser {
      display: flex;
      flex-direction: column;
      flex: 1;
      min-height: 0;
    }

    /* Filter bar */
    .filter-bar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 20px 10px;
      border-bottom: 1px solid var(--border);
      background: var(--bg-panel);
      flex-wrap: wrap;
    }

    .category-tabs {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
    }

    .cat-tab {
      padding: 5px 12px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: var(--bg-active);
      color: var(--text-muted);
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
      text-transform: capitalize;
    }
    .cat-tab:hover {
      background: var(--bg-hover);
      color: var(--text);
    }
    .cat-tab.active {
      background: #1f3a5f;
      border-color: var(--info);
      color: var(--info);
    }

    .search-wrap {
      flex: 1;
      min-width: 160px;
      max-width: 320px;
      position: relative;
    }
    .search-wrap .search-icon {
      position: absolute;
      left: 9px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      font-size: 12px;
      pointer-events: none;
    }
    #template-search {
      width: 100%;
      padding: 6px 10px 6px 28px;
      background: var(--bg-active);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: var(--font);
      font-size: 13px;
      outline: none;
      transition: border-color 0.15s;
    }
    #template-search:focus { border-color: var(--info); }
    #template-search::placeholder { color: var(--text-muted); }

    /* Card grid */
    .card-grid-wrap {
      padding: 20px;
      overflow-y: auto;
      flex: 1;
    }

    .template-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
    }

    @media (max-width: 900px) {
      .template-grid { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 560px) {
      .template-grid { grid-template-columns: 1fr; }
      #app {
        grid-template-columns: 1fr;
        grid-template-areas:
          "header"
          "main"
          "log";
      }
      #sidebar { display: none; }
    }

    /* Template card */
    .template-card {
      background: var(--bg-panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
      cursor: pointer;
      transition: transform 0.15s, border-color 0.15s, box-shadow 0.15s;
      display: flex;
      flex-direction: column;
      gap: 10px;
      min-height: 140px;
    }
    .template-card:hover {
      transform: translateY(-2px);
      border-color: var(--info);
      box-shadow: 0 4px 16px rgba(88, 166, 255, 0.12);
    }
    .template-card:active {
      transform: translateY(0);
    }

    .card-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 8px;
    }

    .card-name {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      line-height: 1.3;
    }

    .card-badges {
      display: flex;
      gap: 4px;
      flex-shrink: 0;
    }

    .badge {
      display: inline-block;
      font-size: 10px;
      padding: 2px 7px;
      border-radius: 10px;
      background: var(--bg-active);
      border: 1px solid var(--border);
      color: var(--text-muted);
      white-space: nowrap;
    }
    .badge.cat-content  { border-color: #388bfd55; color: #79c0ff; }
    .badge.cat-code     { border-color: #3fb95055; color: #56d364; }
    .badge.cat-research { border-color: #e3b34155; color: #e3b341; }
    .badge.cat-general  { border-color: #8b949e55; color: #8b949e; }

    .card-desc {
      font-size: 12px;
      color: var(--text-muted);
      line-height: 1.5;
      /* Clamp to 2 lines */
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .card-footer {
      margin-top: auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .card-author {
      font-size: 11px;
      color: var(--text-muted);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .card-phases {
      font-size: 11px;
      color: var(--text-muted);
      background: var(--bg-active);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 2px 7px;
      white-space: nowrap;
    }

    /* Empty state */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      color: var(--text-muted);
      gap: 8px;
      padding: 60px 0;
    }
    .empty-state .icon { font-size: 32px; }
    .empty-state p { font-size: 13px; text-align: center; }
    .empty-state code {
      background: var(--bg-active);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 1px 6px;
      font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
      font-size: 12px;
    }

    /* ── Template detail (shown when a card is selected) ──────────── */
    #detail-area {
      padding: 20px 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      flex: 1;
    }

    .detail-back {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .detail-back-btn {
      background: none;
      border: none;
      color: var(--info);
      cursor: pointer;
      font-size: 13px;
      padding: 4px 0;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .detail-back-btn:hover { text-decoration: underline; }

    .detail-header {
      display: flex;
      align-items: flex-start;
      gap: 12px;
    }
    .detail-header h2 {
      font-size: 20px;
      font-weight: 600;
      flex: 1;
    }
    .detail-meta {
      font-size: 12px;
      color: var(--text-muted);
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 2px;
    }
    .detail-meta span { display: flex; align-items: center; gap: 4px; }
    .detail-description {
      color: var(--text-muted);
      font-size: 13px;
      line-height: 1.6;
    }

    /* Phases table */
    .section-title {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    .phases-list {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .phase-row {
      background: var(--bg-panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 14px;
      display: grid;
      grid-template-columns: 24px 1fr auto;
      align-items: center;
      gap: 10px;
    }

    .phase-num {
      width: 22px; height: 22px;
      border-radius: 50%;
      background: var(--bg-active);
      border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 10px;
      font-weight: 600;
      color: var(--text-muted);
    }

    .phase-info .phase-name { font-weight: 500; font-size: 13px; }
    .phase-info .phase-desc { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
    .phase-info .phase-deps { font-size: 10px; color: var(--text-muted); margin-top: 2px; }

    .phase-badges { display: flex; gap: 4px; flex-wrap: wrap; }
    .chip {
      font-size: 10px;
      padding: 2px 7px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--bg-active);
      color: var(--text-muted);
    }
    .chip.model { border-color: #58a6ff44; color: var(--info); }
    .chip.thinking { border-color: #e3b34144; color: var(--warning); }

    /* Run form */
    .run-form {
      background: var(--bg-panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .form-row {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .form-row label {
      font-size: 12px;
      color: var(--text-muted);
      min-width: 60px;
    }

    select, input[type="text"], textarea {
      background: var(--bg-active);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: var(--font);
      font-size: 13px;
      padding: 6px 10px;
      outline: none;
      transition: border-color 0.15s;
    }
    select:focus, input[type="text"]:focus, textarea:focus {
      border-color: var(--info);
    }
    select { cursor: pointer; }

    textarea {
      width: 100%;
      resize: vertical;
      min-height: 70px;
      font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
      font-size: 12px;
    }

    .btn {
      padding: 7px 16px;
      border-radius: var(--radius);
      border: none;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, opacity 0.15s;
    }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-primary {
      background: var(--accent-btn);
      color: #fff;
    }
    .btn-primary:not(:disabled):hover { background: var(--accent-btn-hover); }
    .btn-secondary {
      background: var(--bg-active);
      color: var(--text);
      border: 1px solid var(--border);
    }
    .btn-secondary:hover { background: var(--bg-hover); }

    .htmx-indicator { display: none; }
    .htmx-request .htmx-indicator { display: inline; }
    .htmx-request .htmx-spinner { display: inline-block; }

    /* ── Log panel ───────────────────────────────────────────────── */
    #log-panel {
      grid-area: log;
      background: var(--bg-panel);
      border-top: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .log-header {
      padding: 6px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
      flex-shrink: 0;
    }
    .log-header h3 {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
    }
    #run-status-badge {
      font-size: 11px;
      padding: 1px 8px;
      border-radius: 10px;
      background: var(--bg-active);
      border: 1px solid var(--border);
    }
    #run-status-badge.running { border-color: var(--warning); color: var(--warning); }
    #run-status-badge.complete { border-color: var(--accent); color: var(--accent); }
    #run-status-badge.error { border-color: var(--danger); color: var(--danger); }

    .log-clear-btn {
      margin-left: auto;
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 12px;
      padding: 2px 6px;
      border-radius: 3px;
    }
    .log-clear-btn:hover { color: var(--text); background: var(--bg-active); }

    #log-entries {
      overflow-y: auto;
      padding: 6px 16px;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .log-entry {
      display: flex;
      gap: 10px;
      font-size: 12px;
      font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
      padding: 2px 0;
    }
    .log-entry .ts { color: var(--text-muted); flex-shrink: 0; }
    .log-entry .msg { color: var(--text); }
    .log-entry.phase-complete .msg { color: #3fb950; }
    .log-entry.phase-failed .msg   { color: var(--danger); }
    .log-entry.error .msg          { color: var(--danger); }
    .log-entry.start .msg          { color: var(--info); }
    .log-entry.complete .msg       { color: var(--accent-btn-hover); font-weight: 600; }

    .progress-bar-wrap {
      height: 3px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
      width: 100%;
    }
    #progress-bar {
      height: 100%;
      background: var(--info);
      transition: width 0.3s ease;
      width: 0%;
    }

    /* ── Loading spinner ─────────────────────────────────────────── */
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid var(--border);
      border-top-color: var(--info);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
    }

    /* Scrollbar styling */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #444d56; }
  </style>
</head>
<body>
  <div id="app">

    <!-- Header -->
    <header id="header">
      <span class="status-dot" title="Server online"></span>
      <h1>Orchestration Engine</h1>
      <span class="version" id="version-badge">v…</span>
      <span class="spacer"></span>
    </header>

    <!-- Sidebar: quick template navigation -->
    <nav id="sidebar">
      <div class="sidebar-header">
        Templates
        <div style="display:flex;gap:4px;align-items:center;">
          <button class="back-btn" id="sidebar-back-btn" onclick="showBrowser()" title="Back to all templates">← All</button>
          <button class="refresh-btn" onclick="loadTemplates()" title="Refresh">↻</button>
        </div>
      </div>
      <div id="sidebar-template-list">
        <div class="empty-state" style="padding:30px 0">
          <span class="spinner"></span>
        </div>
      </div>
    </nav>

    <!-- Main content -->
    <main id="main">

      <!-- Template Browser (default view) -->
      <div id="template-browser">
        <!-- Filter bar -->
        <div class="filter-bar">
          <div class="category-tabs" id="category-tabs">
            <button class="cat-tab active" data-cat="all" onclick="filterByCategory('all', this)">All</button>
          </div>
          <div class="search-wrap">
            <span class="search-icon">🔍</span>
            <input
              id="template-search"
              type="text"
              placeholder="Search templates…"
              oninput="filterCards()"
              autocomplete="off"
              aria-label="Search templates"
            />
          </div>
        </div>

        <!-- Card grid -->
        <div class="card-grid-wrap">
          <div class="template-grid" id="template-grid">
            <!-- Cards injected by JS -->
            <div class="empty-state" style="grid-column: 1/-1; padding: 60px 0;">
              <span class="spinner"></span>
            </div>
          </div>
          <!-- No-match empty state (hidden by default) -->
          <div id="no-match-state" style="display:none;" class="empty-state">
            <span class="icon">🔍</span>
            <p>No templates found. Run <code>orch new</code> to create one.</p>
          </div>
        </div>
      </div>

      <!-- Template detail (shown when a card is selected) -->
      <div id="detail-area" style="display:none;">
        <!-- injected by JS -->
      </div>
    </main>

    <!-- Log panel -->
    <section id="log-panel">
      <div class="log-header">
        <h3>Pipeline Log</h3>
        <span id="run-status-badge"></span>
        <div class="progress-bar-wrap" style="flex:1; margin:0 8px;">
          <div id="progress-bar"></div>
        </div>
        <button class="log-clear-btn" onclick="clearLog()">Clear</button>
      </div>
      <div id="log-entries">
        <div class="log-entry start"><span class="ts">--:--:--</span><span class="msg">Ready. Select a template to get started.</span></div>
      </div>
    </section>

  </div>

  <script>
    // ── State ────────────────────────────────────────────────────────
    let currentTemplate = null;
    let totalPhases = 0;
    let completedPhases = 0;
    let activeEventSource = null;
    let allTemplates = [];       // Full template list from API
    let activeCategory = 'all'; // Currently selected category filter

    // ── Bootstrap ────────────────────────────────────────────────────
    async function bootstrap() {
      try {
        const res = await fetch('/api/health');
        const data = await res.json();
        document.getElementById('version-badge').textContent = 'v' + data.version;
      } catch(e) { /* ignore */ }
      loadTemplates();
    }

    // ── Load template list ────────────────────────────────────────────
    async function loadTemplates() {
      const grid = document.getElementById('template-grid');
      grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1;padding:60px 0"><span class="spinner"></span></div>';
      document.getElementById('no-match-state').style.display = 'none';

      try {
        const res = await fetch('/api/templates');
        allTemplates = await res.json();
        buildCategoryTabs(allTemplates);
        renderSidebar(allTemplates);
        renderCards(allTemplates);
      } catch(e) {
        grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1"><p>Error loading templates: ${escHtml(String(e))}</p></div>`;
      }
    }

    // ── Build dynamic category tabs ───────────────────────────────────
    function buildCategoryTabs(templates) {
      const cats = new Set(['all']);
      templates.forEach(t => {
        const c = normCat(t.category);
        if (c) cats.add(c);
      });

      const tabsEl = document.getElementById('category-tabs');
      tabsEl.innerHTML = '';
      cats.forEach(cat => {
        const btn = document.createElement('button');
        btn.className = 'cat-tab' + (cat === activeCategory ? ' active' : '');
        btn.dataset.cat = cat;
        btn.textContent = cat === 'all' ? 'All' : capitalize(cat);
        btn.onclick = () => filterByCategory(cat, btn);
        tabsEl.appendChild(btn);
      });
    }

    // ── Render mini sidebar list ──────────────────────────────────────
    function renderSidebar(templates) {
      const list = document.getElementById('sidebar-template-list');
      if (!templates.length) {
        list.innerHTML = '<div class="empty-state" style="padding:20px 0"><p style="font-size:11px">No templates.</p></div>';
        return;
      }
      list.innerHTML = templates.map(t => `
        <div class="sidebar-template-item" id="stpl-${escHtml(t.id)}" onclick="selectTemplate('${escHtml(t.id)}')">
          <div class="st-name">${escHtml(t.name)}</div>
          <div class="st-meta">${escHtml(t.category || 'general')} · ${t.phases_count} phases</div>
        </div>
      `).join('');
    }

    // ── Render template cards ─────────────────────────────────────────
    function renderCards(templates) {
      const grid = document.getElementById('template-grid');
      const noMatch = document.getElementById('no-match-state');

      if (!templates.length) {
        grid.innerHTML = '';
        noMatch.style.display = 'flex';
        return;
      }

      noMatch.style.display = 'none';
      grid.innerHTML = templates.map(t => {
        const catClass = 'cat-' + normCat(t.category || 'general');
        return `
          <div class="template-card" onclick="selectTemplate('${escHtml(t.id)}')" role="button" tabindex="0"
               onkeydown="if(event.key==='Enter')selectTemplate('${escHtml(t.id)}')"
               data-id="${escHtml(t.id)}"
               data-name="${escHtml(t.name).toLowerCase()}"
               data-desc="${escHtml(t.description || '').toLowerCase()}"
               data-cat="${escHtml(normCat(t.category || 'general'))}">
            <div class="card-top">
              <div class="card-name">${escHtml(t.name)}</div>
              <div class="card-badges">
                <span class="badge ${catClass}">${escHtml(capitalize(normCat(t.category || 'general')))}</span>
              </div>
            </div>
            ${t.description ? `<div class="card-desc">${escHtml(t.description)}</div>` : '<div class="card-desc" style="color:transparent">—</div>'}
            <div class="card-footer">
              <span class="card-author">${t.author ? '👤 ' + escHtml(t.author) : ''}</span>
              <span class="card-phases">${t.phases_count} phase${t.phases_count !== 1 ? 's' : ''}</span>
            </div>
          </div>
        `;
      }).join('');
    }

    // ── Filter by category tab ────────────────────────────────────────
    function filterByCategory(cat, btn) {
      activeCategory = cat;
      document.querySelectorAll('.cat-tab').forEach(el => el.classList.remove('active'));
      if (btn) btn.classList.add('active');
      filterCards();
    }

    // ── Client-side filter (search + category) ────────────────────────
    function filterCards() {
      const query = (document.getElementById('template-search').value || '').toLowerCase().trim();
      const cards = document.querySelectorAll('.template-card');
      const noMatch = document.getElementById('no-match-state');

      let visible = 0;
      cards.forEach(card => {
        const name = card.dataset.name || '';
        const desc = card.dataset.desc || '';
        const cat  = card.dataset.cat  || '';

        const catOk = activeCategory === 'all' || cat === activeCategory;
        const searchOk = !query || name.includes(query) || desc.includes(query);

        if (catOk && searchOk) {
          card.style.display = '';
          visible++;
        } else {
          card.style.display = 'none';
        }
      });

      noMatch.style.display = visible === 0 ? 'flex' : 'none';
    }

    // ── Show card browser (back from detail) ──────────────────────────
    function showBrowser() {
      document.getElementById('template-browser').style.display = 'flex';
      document.getElementById('detail-area').style.display = 'none';
      document.getElementById('sidebar-back-btn').classList.remove('visible');
      // Deselect sidebar item
      document.querySelectorAll('.sidebar-template-item').forEach(el => el.classList.remove('active'));
      currentTemplate = null;
    }

    // ── Select + load template detail ────────────────────────────────
    async function selectTemplate(id) {
      // Highlight sidebar item
      document.querySelectorAll('.sidebar-template-item').forEach(el => el.classList.remove('active'));
      const sidebarEl = document.getElementById('stpl-' + id);
      if (sidebarEl) sidebarEl.classList.add('active');

      // Show back button
      document.getElementById('sidebar-back-btn').classList.add('visible');

      // Swap views
      document.getElementById('template-browser').style.display = 'none';
      const detail = document.getElementById('detail-area');
      detail.style.display = 'flex';
      detail.style.flexDirection = 'column';
      detail.innerHTML = '<div class="empty-state"><span class="spinner"></span></div>';

      try {
        const res = await fetch('/api/templates/' + encodeURIComponent(id));
        if (!res.ok) { detail.innerHTML = `<div class="empty-state"><p>Template not found.</p></div>`; return; }
        const t = await res.json();
        currentTemplate = t;
        totalPhases = t.phases.length;
        renderDetail(t);
      } catch(e) {
        detail.innerHTML = `<div class="empty-state"><p>Error: ${escHtml(String(e))}</p></div>`;
      }
    }

    // ── Render template detail ────────────────────────────────────────
    function renderDetail(t) {
      const detail = document.getElementById('detail-area');
      detail.innerHTML = `
        <div class="detail-back">
          <button class="detail-back-btn" onclick="showBrowser()">← All templates</button>
        </div>
        <div class="detail-header">
          <div>
            <h2>${escHtml(t.name)}</h2>
            <div class="detail-meta">
              <span>🏷 ${escHtml(t.version)}</span>
              <span>📦 ${t.phases.length} phases</span>
              ${t.author ? `<span>👤 ${escHtml(t.author)}</span>` : ''}
              ${t.tags && t.tags.length ? `<span>🔖 ${t.tags.map(escHtml).join(', ')}</span>` : ''}
            </div>
          </div>
        </div>
        ${t.description ? `<p class="detail-description">${escHtml(t.description)}</p>` : ''}

        <div>
          <div class="section-title">Phases</div>
          <div class="phases-list">
            ${t.phases.map((p, i) => `
              <div class="phase-row" id="phase-row-${escHtml(p.id)}">
                <div class="phase-num">${i+1}</div>
                <div class="phase-info">
                  <div class="phase-name">${escHtml(p.name || p.id)}</div>
                  ${p.description ? `<div class="phase-desc">${escHtml(p.description)}</div>` : ''}
                  ${p.depends_on && p.depends_on.length ? `<div class="phase-deps">depends on: ${p.depends_on.map(escHtml).join(', ')}</div>` : ''}
                </div>
                <div class="phase-badges">
                  <span class="chip model">${escHtml(p.model_tier)}</span>
                  ${p.thinking_level && p.thinking_level !== 'off' ? `<span class="chip thinking">${escHtml(p.thinking_level)}</span>` : ''}
                </div>
              </div>
            `).join('')}
          </div>
        </div>

        <div>
          <div class="section-title">Run Pipeline</div>
          <div class="run-form" id="run-form">
            <div class="form-row">
              <label>Mode</label>
              <select id="run-mode">
                <option value="dry-run">dry-run (mock)</option>
                <option value="standalone">standalone (Anthropic API)</option>
                <option value="openclaw">openclaw (sub-agent)</option>
              </select>
            </div>
            <div>
              <label style="font-size:12px; color:var(--text-muted); display:block; margin-bottom:4px;">
                Input JSON ${t.example_input && Object.keys(t.example_input).length ? '(example shown)' : '(optional)'}
              </label>
              <textarea id="run-input" placeholder="{}">${t.example_input && Object.keys(t.example_input).length ? JSON.stringify(t.example_input, null, 2) : ''}</textarea>
            </div>
            <div class="form-row">
              <button class="btn btn-primary" id="run-btn" onclick="startRun()">▶ Run Pipeline</button>
              <span id="run-spinner" style="display:none;"><span class="spinner"></span> Running…</span>
            </div>
          </div>
        </div>
      `;
    }

    // ── Start a run ───────────────────────────────────────────────────
    async function startRun() {
      if (!currentTemplate) return;

      const mode = document.getElementById('run-mode').value;
      const inputRaw = document.getElementById('run-input').value.trim();
      let inputData = {};
      if (inputRaw) {
        try { inputData = JSON.parse(inputRaw); }
        catch(e) { logEntry('error', 'Invalid JSON in input: ' + e.message); return; }
      }

      // Close any prior SSE
      if (activeEventSource) { activeEventSource.close(); activeEventSource = null; }

      document.getElementById('run-btn').disabled = true;
      document.getElementById('run-spinner').style.display = '';
      completedPhases = 0;
      setBadge('running', 'running');
      setProgress(0);
      clearLog();

      try {
        const res = await fetch('/api/run', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({template: currentTemplate.id, mode, input: inputData})
        });
        if (!res.ok) {
          const err = await res.json();
          logEntry('error', 'Failed to start run: ' + (err.detail || res.status));
          resetRunBtn();
          return;
        }
        const {run_id} = await res.json();
        logEntry('start', `Run started: ${run_id}  [${mode}]  template=${currentTemplate.id}`);
        connectSSE(run_id);
      } catch(e) {
        logEntry('error', 'Network error: ' + e.message);
        resetRunBtn();
      }
    }

    // ── SSE connection ────────────────────────────────────────────────
    function connectSSE(runId) {
      const es = new EventSource('/api/run/' + runId + '/status');
      activeEventSource = es;

      es.onmessage = function(e) {
        let evt;
        try { evt = JSON.parse(e.data); } catch { return; }
        handleEvent(evt);
      };

      es.onerror = function() {
        if (es.readyState === EventSource.CLOSED) return;
        logEntry('error', 'SSE connection lost.');
        es.close();
        resetRunBtn();
      };
    }

    function handleEvent(evt) {
      const type = evt.type;
      if (type === 'start') {
        logEntry('start', `Pipeline starting: ${evt.template}  mode=${evt.mode}`);
      } else if (type === 'phase_complete') {
        completedPhases++;
        setProgress(totalPhases > 0 ? (completedPhases / totalPhases) * 100 : 0);
        const cost = evt.cost_usd ? ` $${parseFloat(evt.cost_usd).toFixed(4)}` : '';
        logEntry('phase-complete', `✓ ${evt.phase_id}  state=${evt.state}  tokens=${evt.tokens}${cost}`);
        highlightPhase(evt.phase_id, 'complete');
      } else if (type === 'phase_failed') {
        const cost = evt.cost_usd ? ` $${parseFloat(evt.cost_usd).toFixed(4)}` : '';
        logEntry('phase-failed', `✗ ${evt.phase_id}  state=${evt.state}  tokens=${evt.tokens}${cost}`);
        highlightPhase(evt.phase_id, 'failed');
      } else if (type === 'complete') {
        logEntry('complete', `✅ Pipeline complete! ${evt.phases} phases finished.`);
        setBadge('complete', 'complete');
        setProgress(100);
        resetRunBtn();
        if (activeEventSource) { activeEventSource.close(); activeEventSource = null; }
      } else if (type === 'aborted') {
        logEntry('phase-failed', `Pipeline aborted at phase: ${evt.failed_phase}`);
        setBadge('error', 'aborted');
        resetRunBtn();
        if (activeEventSource) { activeEventSource.close(); activeEventSource = null; }
      } else if (type === 'error') {
        logEntry('error', `Error: ${evt.message}`);
        setBadge('error', 'error');
        resetRunBtn();
        if (activeEventSource) { activeEventSource.close(); activeEventSource = null; }
      }
    }

    // ── Helpers ───────────────────────────────────────────────────────
    function highlightPhase(phaseId, state) {
      const row = document.getElementById('phase-row-' + phaseId);
      if (!row) return;
      const num = row.querySelector('.phase-num');
      if (state === 'complete') {
        num.style.background = '#1a3e1a';
        num.style.borderColor = '#3fb950';
        num.style.color = '#3fb950';
        num.textContent = '✓';
      } else {
        num.style.background = '#3e1a1a';
        num.style.borderColor = '#da3633';
        num.style.color = '#da3633';
        num.textContent = '✗';
      }
    }

    function logEntry(cls, msg) {
      const el = document.getElementById('log-entries');
      const ts = new Date().toTimeString().slice(0,8);
      const div = document.createElement('div');
      div.className = 'log-entry ' + cls;
      div.innerHTML = `<span class="ts">${ts}</span><span class="msg">${escHtml(msg)}</span>`;
      el.appendChild(div);
      el.scrollTop = el.scrollHeight;
    }

    function clearLog() {
      document.getElementById('log-entries').innerHTML = '';
    }

    function setBadge(cls, text) {
      const badge = document.getElementById('run-status-badge');
      badge.className = cls;
      badge.textContent = text;
    }

    function setProgress(pct) {
      document.getElementById('progress-bar').style.width = pct + '%';
    }

    function resetRunBtn() {
      const btn = document.getElementById('run-btn');
      if (btn) btn.disabled = false;
      const spinner = document.getElementById('run-spinner');
      if (spinner) spinner.style.display = 'none';
    }

    function escHtml(s) {
      if (s == null) return '';
      return String(s)
        .replace(/&/g,'&amp;')
        .replace(/</g,'&lt;')
        .replace(/>/g,'&gt;')
        .replace(/"/g,'&quot;');
    }

    function normCat(cat) {
      // Normalize category to one of known buckets
      if (!cat) return 'general';
      const c = cat.toLowerCase().trim();
      if (c === 'content' || c === 'writing') return 'content';
      if (c === 'code' || c === 'development' || c === 'coding') return 'code';
      if (c === 'research' || c === 'analysis') return 'research';
      return c;
    }

    function capitalize(s) {
      if (!s) return s;
      return s.charAt(0).toUpperCase() + s.slice(1);
    }

    // ── Init ─────────────────────────────────────────────────────────
    bootstrap();
  </script>
</body>
</html>
