      - openapi
      - markdown
      - developer-experience
    install_command: "orch templates install community/orch-api-docs-generator"

  - name: data-quality-pipeline
    description: >
      Data quality assessment: schema validation → null / outlier detection →
      distribution analysis → quality score → remediation recommendations.
    author: community/data-eng
    repo_url: https://github.com/community/orch-data-quality-pipeline
    version: "0.5.0"
    category: data
    tags:
      - data
